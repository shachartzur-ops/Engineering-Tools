<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>כלי הנדסה — מחלקת הנדסת מכונות</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>body{margin:0;background:#020509;}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useMemo } = React;

// ── GLOBAL STYLES ─────────────────────────────────────────────
const CSS = `
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#020509}
  ::-webkit-scrollbar-thumb{background:#1a3860;border-radius:3px}
  input,select,button{outline:none;-webkit-tap-highlight-color:transparent;}
  input[type=range]{cursor:pointer;height:4px;border-radius:2px;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;cursor:pointer;}
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  input[type=number]{-moz-appearance:textfield;}
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .tbl-wrap::-webkit-scrollbar{height:3px;}

  @keyframes gridScroll{from{background-position:0 0}to{background-position:40px 40px}}
  @keyframes rotateRing{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes rotateRev{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  .tool-card{animation:fadeInUp .4s ease both;}
  .tool-card:nth-child(1){animation-delay:.04s}.tool-card:nth-child(2){animation-delay:.08s}
  .tool-card:nth-child(3){animation-delay:.12s}.tool-card:nth-child(4){animation-delay:.16s}
  .tool-card:nth-child(5){animation-delay:.20s}.tool-card:nth-child(6){animation-delay:.24s}
  .tool-card:nth-child(7){animation-delay:.28s}.tool-card:nth-child(8){animation-delay:.32s}
  .tool-card:nth-child(9){animation-delay:.36s}.tool-card:nth-child(10){animation-delay:.40s}
  .tool-card:nth-child(11){animation-delay:.44s}.tool-card:nth-child(12){animation-delay:.48s}
  .tool-card:nth-child(13){animation-delay:.52s}
  .res-anim{animation:fadeIn .25s ease;}

  /* ── Responsive ───────────────────────────────── */
  @media(max-width:900px){
    .r-two-col{grid-template-columns:1fr!important;}
    .r-bear{grid-template-columns:1fr!important;}
    .r-tool-grid{grid-template-columns:1fr 1fr!important;}
  }
  @media(max-width:768px){
    .r-tool-grid{grid-template-columns:1fr 1fr!important;}
    .r-k4{grid-template-columns:1fr 1fr!important;}
    .r-k3{grid-template-columns:1fr!important;}
    .r-notes{grid-template-columns:1fr!important;}
    .r-hero{padding:36px 20px 28px!important;}
    .r-h1{font-size:42px!important;line-height:1.1!important;}
    .r-body{padding:20px 16px!important;}
    .r-head{padding:0 16px!important;}
    .r-filter{padding:16px 16px 0!important;}
    .r-stat{flex-wrap:wrap!important;gap:14px!important;padding:16px 18px!important;justify-content:center!important;}
    .r-stat-div{display:none!important;}
    .r-hero-title{gap:10px!important;}
    .r-hero-bar{height:52px!important;}
  }
  @media(max-width:480px){
    .r-tool-grid{grid-template-columns:1fr!important;}
    .r-k4{grid-template-columns:1fr 1fr!important;}
    .r-h1{font-size:34px!important;}
    .r-head-title{font-size:16px!important;}
  }
`;

// ── PALETTE ───────────────────────────────────────────────────
const C={
  bg:'#020509',surf:'#060d1b',card:'#091525',cardH:'#0e1e38',
  border:'#0d2040',borderB:'#1a3d6e',borderBright:'#2a5a9e',
  blue:'#00a8ff',orange:'#ff6620',green:'#00e87c',red:'#ff2244',
  yellow:'#ffcc00',white:'#c8dfff',muted:'#3d5a80',dim:'#112040',
};

// ── SHARED COMPONENTS ─────────────────────────────────────────
const Mono=({c,s=14,children})=>(
  <span style={{fontFamily:"'JetBrains Mono',monospace",color:c||C.blue,fontSize:s,fontWeight:600}}>{children}</span>
);

const Badge=({children,color=C.blue,size=10})=>(
  <span style={{background:`${color}22`,color,border:`1px solid ${color}44`,borderRadius:4,
    padding:'2px 8px',fontSize:size,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',whiteSpace:'nowrap'}}>
    {children}
  </span>
);

const Card=({children,style={},glow,accent,className=''})=>(
  <div className={className} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,
    boxShadow:glow?`0 0 28px ${glow}`:undefined,
    borderTop:accent?`2px solid ${accent}`:undefined,...style}}>
    {children}
  </div>
);

const ResultBig=({label,value,unit,color=C.blue,sub})=>(
  <div className="res-anim" style={{background:`${color}0f`,border:`1px solid ${color}33`,borderRadius:12,
    padding:'20px 22px',marginBottom:12,boxShadow:`inset 0 1px 0 ${color}22`}}>
    <div style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:'.12em',marginBottom:6}}>{label}</div>
    <div style={{display:'flex',alignItems:'baseline',gap:8,flexWrap:'wrap'}}>
      <span style={{fontFamily:"'Rajdhani',sans-serif",color,fontSize:44,fontWeight:700,lineHeight:1}}>{value}</span>
      {unit&&<span style={{color,fontSize:16,opacity:.7}}>{unit}</span>}
    </div>
    {sub&&<div style={{color:C.muted,fontSize:11,marginTop:4}}>{sub}</div>}
  </div>
);

const ResultSm=({label,value,unit,color=C.blue})=>(
  <div className="res-anim" style={{background:`${color}0a`,border:`1px solid ${color}22`,borderRadius:10,padding:'12px 14px'}}>
    <div style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:'.1em',marginBottom:4}}>{label}</div>
    <div style={{display:'flex',alignItems:'baseline',gap:5,flexWrap:'wrap'}}>
      <Mono c={color} s={20}>{value}</Mono>
      {unit&&<span style={{color,fontSize:12,opacity:.6}}>{unit}</span>}
    </div>
  </div>
);

const Inp=({label,value,onChange,unit,min,max,step="any"})=>(
  <div style={{marginBottom:14}}>
    <div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'.07em',marginBottom:6}}>{label}</div>
    <div style={{display:'flex',alignItems:'center',background:C.surf,border:`1px solid ${C.borderB}`,
      borderRadius:9,overflow:'hidden',boxShadow:`inset 0 2px 4px ${C.bg}`}}>
      <input type="number" value={value} onChange={e=>onChange(e.target.value)}
        onFocus={e=>{const t=e.target;setTimeout(()=>t.select(),0);}}
        onClick={e=>{const t=e.target;setTimeout(()=>t.select(),0);}}
        min={min} max={max} step={step}
        style={{flex:1,background:'transparent',color:C.white,padding:'11px 14px',fontSize:15,
          fontFamily:"'JetBrains Mono',monospace",border:'none'}}/>
      {unit&&<span style={{color:C.muted,padding:'0 14px',fontSize:12,borderRight:`1px solid ${C.border}`,
        paddingTop:11,paddingBottom:11,background:`${C.bg}88`}}>{unit}</span>}
    </div>
  </div>
);

// ── SLIDER WITH NUMBER INPUT ──────────────────────────────────
const Slider=({label,value,onChange,min,max,step=1,color=C.blue,unit})=>{
  const [txt,setTxt]=useState(String(value));
  // סנכרון נכון: כשה-parent משנה value מבחוץ, עדכן txt
  const [synced,setSynced]=useState(value);
  if(value!==synced){setSynced(value);setTxt(String(value));}

  const pct=Math.min(100,Math.max(0,((value-min)/(max-min)*100))).toFixed(1);
  const sel=e=>{const t=e.target;setTimeout(()=>t.select(),0);};
  const handleSlider=e=>{const v=parseFloat(e.target.value);onChange(v);setTxt(String(v));};
  const handleType=e=>{
    setTxt(e.target.value);
    const n=parseFloat(e.target.value);
    if(!isNaN(n))onChange(Math.min(Math.max(n,min),max));
  };
  const handleBlur=()=>{
    const n=parseFloat(txt);
    if(isNaN(n)||n<min){onChange(min);setTxt(String(min));}
    else if(n>max){onChange(max);setTxt(String(max));}
    else{const r=Math.round(n*10000)/10000;setTxt(String(r));}
  };

  return(
    <div style={{marginBottom:18}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7,gap:8}}>
        <div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'.07em',flex:1,minWidth:0,
          overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{label}</div>
        <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
          <input type="number" value={txt} onChange={handleType} onBlur={handleBlur}
            onFocus={sel} onClick={sel} min={min} max={max} step={step}
            style={{width:72,background:`${color}11`,border:`1px solid ${color}55`,borderRadius:7,
              color,padding:'5px 8px',fontSize:13,fontFamily:"'JetBrains Mono',monospace",
              fontWeight:600,textAlign:'center',transition:'border-color .2s'}}/>
          {unit&&<span style={{color,fontSize:11,opacity:.7,minWidth:20,textAlign:'left'}}>{unit}</span>}
        </div>
      </div>
      <input type="range" min={min} max={max} step={step} value={value} onChange={handleSlider}
        style={{width:'100%',accentColor:color,cursor:'pointer',
          background:`linear-gradient(90deg,${color} ${pct}%,${C.borderB} ${pct}%)`}}/>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:2}}>
        <span style={{color:C.dim,fontSize:10}}>{min}</span>
        <span style={{color:C.dim,fontSize:10}}>{max}</span>
      </div>
    </div>
  );
};

const Sel=({label,value,onChange,options})=>(
  <div style={{marginBottom:14}}>
    {label&&<div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'.07em',marginBottom:6}}>{label}</div>}
    <select value={value} onChange={e=>onChange(e.target.value)}
      style={{width:'100%',background:C.surf,color:C.white,border:`1px solid ${C.borderB}`,
        borderRadius:9,padding:'11px 14px',fontSize:13,cursor:'pointer',fontFamily:"'Barlow',sans-serif",
        minHeight:44}}>
      {options.map(o=><option key={o.v} value={o.v} style={{background:C.card}}>{o.l}</option>)}
    </select>
  </div>
);

const BackBtn=({onBack})=>(
  <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:8,color:C.muted,
    background:'transparent',border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 18px',
    cursor:'pointer',fontSize:13,fontFamily:"'Barlow',sans-serif",transition:'all .2s',
    minHeight:44,flexShrink:0,whiteSpace:'nowrap'}}
    onMouseEnter={e=>{e.currentTarget.style.color=C.blue;e.currentTarget.style.borderColor=C.blue;}}
    onMouseLeave={e=>{e.currentTarget.style.color=C.muted;e.currentTarget.style.borderColor=C.border;}}>
    ← חזרה
  </button>
);

const SectionLabel=({children})=>(
  <div style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:'.15em',
    textTransform:'uppercase',marginBottom:14,display:'flex',alignItems:'center',gap:8}}>
    <div style={{flex:1,height:1,background:C.border}}/>
    <span style={{whiteSpace:'nowrap'}}>{children}</span>
    <div style={{flex:1,height:1,background:C.border}}/>
  </div>
);

const ToolLayout=({title,subtitle,onBack,children,accent=C.blue})=>(
  <div style={{minHeight:'100vh',background:C.bg,color:C.white,direction:'rtl',
    fontFamily:"'Barlow',sans-serif",animation:'fadeIn .3s ease'}}>
    <div className="r-head" style={{borderBottom:`1px solid ${C.border}`,background:C.surf,
      padding:'0 36px',display:'flex',alignItems:'stretch',minHeight:64}}>
      <div style={{width:3,background:`linear-gradient(180deg,${accent},${accent}00)`,marginLeft:20,flexShrink:0}}/>
      <div style={{flex:1,display:'flex',alignItems:'center',gap:12,paddingRight:4,minWidth:0}}>
        <div style={{minWidth:0}}>
          <div className="r-head-title" style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,
            fontWeight:700,color:C.white,letterSpacing:'.02em',overflow:'hidden',
            textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{title}</div>
          {subtitle&&<div style={{color:C.muted,fontSize:11,marginTop:1,overflow:'hidden',
            textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{subtitle}</div>}
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',paddingRight:0}}>
        <BackBtn onBack={onBack}/>
      </div>
    </div>
    <div className="r-body" style={{padding:'24px 32px',maxWidth:1120,margin:'0 auto'}}>{children}</div>
  </div>
);

const TwoCol=({left,right,flip})=>(
  <div className="r-two-col"
    style={{display:'grid',gridTemplateColumns:flip?'340px 1fr':'1fr 340px',gap:20,alignItems:'start'}}>
    {flip?<>{right}{left}</>:<>{left}{right}</>}
  </div>
);

// ── T1: BEARING TOLERANCES ────────────────────────────────────
const BearingCases=[
  {id:1,title:'מקרה 1',sub:'גל מסתובב / בית נייח',pointLoad:'OUTER RING',rotLoad:'INNER RING',
   shaft:{fits:'k6, m6',type:'INTERFERENCE FIT',color:C.red},
   housing:{fits:'H6, J6',type:'CLEARANCE FIT',color:C.green},
   desc:'הטבעת הפנימית מסתובבת עם הגל — חייבת התאמה מהודקת (Tight Fit) על הגל כדי למנוע החלקה.'},
  {id:2,title:'מקרה 2',sub:'גל נייח / בית מסתובב',pointLoad:'INNER RING',rotLoad:'OUTER RING',
   shaft:{fits:'h6, g6',type:'CLEARANCE FIT',color:C.green},
   housing:{fits:'M6, K6',type:'INTERFERENCE FIT',color:C.red},
   desc:'הטבעת החיצונית מסתובבת עם הבית (גלגלת/גלף) — חייבת התאמה מהודקת בתוך הבית.'},
];

const BearingSVG=({caseId,size=150,animated})=>(
  <svg viewBox="0 0 160 160" width={size} height={size}>
    <circle cx="80" cy="80" r="72" fill={C.card} stroke={caseId===2?C.orange:C.borderB} strokeWidth="1.5"
      style={animated&&caseId===2?{transformOrigin:'80px 80px',animation:'rotateRing 8s linear infinite'}:undefined}/>
    <circle cx="80" cy="80" r="58" fill="none" stroke={C.borderB} strokeWidth=".5" strokeDasharray="3 2"/>
    {[0,45,90,135,180,225,270,315].map((a,i)=>{
      const x=80+64*Math.cos(a*Math.PI/180),y=80+64*Math.sin(a*Math.PI/180);
      return <circle key={i} cx={x} cy={y} r="7" fill={C.cardH} stroke={C.borderBright} strokeWidth="1.2"/>;
    })}
    <circle cx="80" cy="80" r="44" fill={C.surf} stroke={caseId===1?C.orange:C.borderB} strokeWidth="1.5"
      style={animated&&caseId===1?{transformOrigin:'80px 80px',animation:'rotateRev 5s linear infinite'}:undefined}/>
    <circle cx="80" cy="80" r="28" fill={C.card} stroke={C.borderB} strokeWidth="1"/>
    <circle cx="80" cy="80" r="16" fill={C.surf} stroke={C.borderB} strokeWidth="1"/>
    <line x1="80" y1="64" x2="80" y2="96" stroke={C.borderB} strokeWidth=".5"/>
    <line x1="64" y1="80" x2="96" y2="80" stroke={C.borderB} strokeWidth=".5"/>
  </svg>
);

const Notes=[
  {n:1,t:'עומסי הלם/רטט',b:'עבור עומסים כבדים יש להעלות דרגת ההתערבות בצעד אחד (n6 במקום m6).'},
  {n:2,t:'חומר הבית (Thermal)',b:'בית אלומיניום — השתמש בK6/K7 בגלל התפשטות תרמית גבוהה.'},
  {n:3,t:'טמפרטורה גבוהה',b:'מעל 80°C — השתמש במיסב עם מרווח פנימי מוגדל (C3) למניעת תפיסה.'},
];

const BearingTolerances=({onBack})=>{
  const [sel,setSel]=useState(null);

  if(!sel) return(
    <ToolLayout title="טולרנסים למיסבים" subtitle="ISO 286 — בחירת התאמות לפי סוג עומס" onBack={onBack} accent={C.blue}>
      <SectionLabel>בחר את המקרה המתאים ליישום שלך</SectionLabel>
      <div className="r-bear" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18,marginBottom:24}}>
        {BearingCases.map(c=>(
          <div key={c.id} onClick={()=>setSel(c.id)}
            style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:24,
              cursor:'pointer',transition:'all .25s',position:'relative',overflow:'hidden',minHeight:44}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=`${C.blue}88`;e.currentTarget.style.transform='translateY(-3px)';e.currentTarget.style.boxShadow=`0 8px 24px ${C.blue}22`;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='';}}>
            <div style={{position:'absolute',top:0,left:0,right:0,height:2,
              background:`linear-gradient(90deg,${C.orange},${C.blue})`}}/>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,flexWrap:'wrap',gap:8}}>
              <div>
                <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:28,fontWeight:700,color:C.orange}}>{c.title}</div>
                <div style={{color:C.muted,fontSize:12}}>{c.sub}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:5}}>
                <Badge color={C.muted} size={9}>POINT: {c.pointLoad}</Badge>
                <Badge color={C.blue} size={9}>ROTATING: {c.rotLoad}</Badge>
              </div>
            </div>
            <div style={{display:'flex',justifyContent:'center',margin:'12px 0'}}>
              <BearingSVG caseId={c.id} size={130}/>
            </div>
            <div style={{color:`${C.white}88`,fontSize:12,lineHeight:1.7,marginBottom:16,
              borderTop:`1px solid ${C.border}`,paddingTop:14}}>{c.desc}</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {[{l:'גל (SHAFT)',d:c.shaft},{l:'בית (HOUSING)',d:c.housing}].map(item=>(
                <div key={item.l} style={{background:C.bg,border:`1px solid ${item.d.color}33`,borderRadius:10,
                  padding:12,textAlign:'center'}}>
                  <div style={{color:C.muted,fontSize:10,marginBottom:6}}>{item.l}</div>
                  <div style={{fontFamily:"'JetBrains Mono'",color:item.d.color,fontSize:20,fontWeight:700,marginBottom:5}}>{item.d.fits}</div>
                  <Badge color={item.d.color} size={9}>{item.d.type}</Badge>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
      <Card style={{padding:20}}>
        <SectionLabel>ENGINEERING NOTES</SectionLabel>
        <div className="r-notes" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
          {Notes.map(n=>(
            <div key={n.n} style={{background:C.surf,borderRadius:10,padding:14}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                <span style={{background:C.blue,color:C.bg,borderRadius:'50%',width:22,height:22,
                  display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>{n.n}</span>
                <span style={{color:C.white,fontWeight:600,fontSize:13}}>{n.t}</span>
              </div>
              <div style={{color:C.muted,fontSize:12,lineHeight:1.65}}>{n.b}</div>
            </div>
          ))}
        </div>
      </Card>
    </ToolLayout>
  );

  const c=BearingCases[sel-1];
  return(
    <ToolLayout title={`טולרנסים — ${c.title}`} subtitle={c.sub} onBack={onBack} accent={C.orange}>
      <div style={{display:'flex',gap:8,marginBottom:18,flexWrap:'wrap'}}>
        {BearingCases.map(cc=>(
          <button key={cc.id} onClick={()=>setSel(cc.id)} style={{
            background:cc.id===sel?`${C.blue}22`:C.surf,border:`1px solid ${cc.id===sel?C.blue:C.border}`,
            color:cc.id===sel?C.blue:C.muted,borderRadius:8,padding:'10px 18px',cursor:'pointer',
            fontSize:13,minHeight:44,transition:'all .2s'}}>
            {cc.title}
          </button>
        ))}
      </div>
      <TwoCol
        left={<div>
          <Card style={{padding:24,marginBottom:16,position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',inset:0,background:`radial-gradient(ellipse at 50% 100%,${C.blue}08 0%,transparent 70%)`}}/>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,flexWrap:'wrap',gap:10,position:'relative'}}>
              <div style={{color:C.muted,fontSize:13,maxWidth:340,lineHeight:1.7}}>{c.desc}</div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                <Badge>POINT: {c.pointLoad}</Badge>
                <Badge color={C.orange}>ROTATING: {c.rotLoad}</Badge>
              </div>
            </div>
            <div style={{display:'flex',justifyContent:'center',padding:'16px 0',position:'relative'}}>
              <BearingSVG caseId={sel} size={170} animated={true}/>
            </div>
          </Card>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>

  },[mass,rad,vel,sf]);

            ))}

              </div>
              <div style={{padding:'0 10px',color:C.dim,fontSize:22}}>=</div>

// ── T5: PULLEY RATIOS ─────────────────────────────────────────
const STD_T=[16,18,19,20,22,24,25,28,30,32,36,38,40,42,45,48,50,55,56,60,63,70,71,75,80,85,90,95,100,112,118,125,132,140,150,160,180,200,224,250,280,315,355,400];
const PulleyRatios=({onBack})=>{
  const [motorRpm,setMotorRpm]=useState(1400);const [targetRpm,setTargetRpm]=useState(400);const [driverD,setDriverD]=useState(100);
  const calc=useMemo(()=>{
    const idealR=parseFloat(motorRpm)/parseFloat(targetRpm),drivenD=parseFloat(driverD)*idealR;
    const combos=[];
    for(let d1 of STD_T){for(let d2 of STD_T){const r=d2/d1,dev=(r-idealR)/idealR*100;if(Math.abs(dev)<2){combos.push({d1,d2,ratio:r.toFixed(3),dev:dev.toFixed(2),rpm:(parseFloat(motorRpm)*d1/d2).toFixed(0)});if(combos.length>=7)break;}}if(combos.length>=7)break;}
    return{idealR:idealR.toFixed(3),drivenD:drivenD.toFixed(0),combos};
  },[motorRpm,targetRpm,driverD]);
  const sc=Math.min(46,parseFloat(driverD)/4),dsc=Math.min(46,parseFloat(calc.drivenD)/4);
  return(
    <ToolLayout title="מחשבון יחסי פולי" subtitle="חישוב יחסי העברה ושילובי גלגלי שיניים תקניים" onBack={onBack} accent={C.yellow}>

// ── T7: FILM ROLL WEIGHT ──────────────────────────────────────
const FILM_MATS=[{v:'HDPE',l:'HDPE (0.95 g/cm³)',d:0.95},{v:'LDPE',l:'LDPE (0.92 g/cm³)',d:0.92},{v:'PP',l:'PP (0.91 g/cm³)',d:0.91},{v:'PVC',l:'PVC (1.38 g/cm³)',d:1.38},{v:'PET',l:'PET (1.38 g/cm³)',d:1.38}];
const CORE_TYPES=[{v:'cardboard',l:'קרטון (0.8 g/cm³)',d:0.8,wall:6},{v:'steel',l:'פלדה (7.85 g/cm³)',d:7.85,wall:5},{v:'plastic',l:'פלסטיק (1.05 g/cm³)',d:1.05,wall:4}];
const CORE_IDS=[{v:'76.2',l:'3" (76.2 mm)'},{v:'152.4',l:'6" (152.4 mm)'},{v:'76',l:'76 mm'},{v:'150',l:'150 mm'}];
const FilmRollWeight=({onBack})=>{
  const [mat,setMat]=useState('HDPE');const [core,setCore]=useState('cardboard');
  const [cID,setCID]=useState('76.2');const [OD,setOD]=useState(400);const [W,setW]=useState(1000);const [thick,setThick]=useState(50);
  const calc=useMemo(()=>{
    const film=FILM_MATS.find(f=>f.v===mat),ct=CORE_TYPES.find(c=>c.v===core);
    const ID=parseFloat(cID),od=parseFloat(OD),w=parseFloat(W),t=parseFloat(thick),ODc=ID+2*ct.wall;
    const Vf=Math.PI/4*((od/10)**2-(ODc/10)**2)*(w/10)*0.97;
    const Mf=Vf*film.d/1000,L=Vf/((w/10)*(t/10000))/100;
    const Vc=Math.PI/4*((ODc/10)**2-(ID/10)**2)*(w/10),Mc=Vc*ct.d/1000;
    return{Mt:(Mf+Mc).toFixed(2),Mf:Mf.toFixed(2),Mc:Mc.toFixed(2),L:L.toFixed(1),ODc:ODc.toFixed(1)};
  },[mat,core,cID,OD,W,thick]);
  return(
    <ToolLayout title="מחשבון משקל גליל פילם" subtitle="v1.0 — RCoT Standard" onBack={onBack} accent={C.yellow}>
      <TwoCol
        left={<div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
            <ResultBig label="אורך יריעה כולל" value={calc.L} unit="מטר" color={C.green}/>
            <ResultBig label='משקל כולל להרמה' value={calc.Mt} unit='ק"ג' color={C.orange}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
            <ResultSm label='משקל פילם נטו' value={`${calc.Mf} ק"ג`}/>
            <ResultSm label='משקל ליבה' value={`${calc.Mc} ק"ג`} color={C.muted}/>
          </div>
          <Card style={{padding:20,marginBottom:14}}>
            <SectionLabel>חתך גליל — סכמה הנדסית</SectionLabel>
            <div style={{display:'flex',justifyContent:'center',background:C.bg,borderRadius:10,padding:'16px 0'}}>
              <svg viewBox="0 0 220 220" width="200" height="200">
                <circle cx="110" cy="110" r={Math.min(88,parseFloat(OD)/5)} fill={`${C.blue}0a`} stroke={C.blue} strokeWidth="1.5"/>
                {[.9,.8,.7,.6].map((r,i)=><circle key={i} cx="110" cy="110" r={Math.min(88,parseFloat(OD)/5)*r} fill="none" stroke={`${C.blue}${i===0?'33':'18'}`} strokeWidth=".5"/>)}
                <circle cx="110" cy="110" r={parseFloat(calc.ODc)/10*1.15} fill={C.card} stroke={C.orange} strokeWidth="1.5"/>
                <circle cx="110" cy="110" r={parseFloat(cID)/10*1.15} fill={C.surf} stroke={C.muted} strokeWidth="1"/>
                <line x1="110" y1="110" x2={110+Math.min(88,parseFloat(OD)/5)} y2="110" stroke={C.blue} strokeWidth=".8" strokeDasharray="3 2"/>
                <text x={118+Math.min(88,parseFloat(OD)/5)/2} y="107" fill={C.blue} fontSize="8" fontFamily="JetBrains Mono">OD={OD}</text>
                <text x="110" y="114" textAnchor="middle" fill={C.muted} fontSize="7">ID={cID}</text>
              </svg>
            </div>
          </Card>
          <Card style={{padding:16}}>
            <SectionLabel>ENGINEERING FORMULAS</SectionLabel>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {[['V_film','(π/4)×(OD²-ODc²)×W×0.97'],['L_film','V/(W×t)/100'],['M_film','V×ρ/1000'],['M_total','Mf+Mc']].map(([k,v])=>(
                <div key={k} style={{background:C.surf,borderRadius:7,padding:9}}>
                  <Mono c={C.orange} s={11}>{k} =</Mono>
                  <div style={{color:C.muted,fontSize:10,marginTop:2,fontFamily:'monospace'}}>{v}</div>
                </div>
              ))}
            </div>
          </Card>
        </div>}
        right={<Card style={{padding:20}}>
          <SectionLabel>נתוני יסוד</SectionLabel>
          <Sel label="סוג חומר (Film)" value={mat} onChange={setMat} options={FILM_MATS.map(f=>({v:f.v,l:f.l}))}/>
          <Sel label="סוג ליבה (Core)" value={core} onChange={setCore} options={CORE_TYPES.map(c=>({v:c.v,l:c.l}))}/>
          <Sel label="קוטר ליבה פנימי ID" value={cID} onChange={setCID} options={CORE_IDS}/>
          <Inp label='קוטר חיצוני OD (מ"מ)' value={OD} onChange={setOD} unit="mm" min="50"/>
          <Inp label='רוחב גליל W (מ"מ)' value={W} onChange={setW} unit="mm" min="10"/>
          <Inp label="עובי יריעה t (מיקרון)" value={thick} onChange={setThick} unit="μm" min="5" step="5"/>
        </Card>}
      />
    </ToolLayout>
  );
};

// ── T8: PISTON FORCE ──────────────────────────────────────────
// תקן ISO 15552 (צילינדרים) + ISO 6432 (מיני) — הסטנדרט המקובל בתעשייה
// Festo / SMC / Parker / Bosch Rexroth / Aventics
const BORE_ROD_STD=[
  {bore:8,   rod:4,  thread:'M4'},
  {bore:10,  rod:4,  thread:'M4'},
  {bore:12,  rod:4,  thread:'M5'},
  {bore:16,  rod:6,  thread:'M6'},
  {bore:20,  rod:8,  thread:'M8'},
  {bore:25,  rod:10, thread:'M10'},
  {bore:32,  rod:16, thread:'M10×1.25'},
  {bore:40,  rod:16, thread:'M12×1.25'},
  {bore:50,  rod:20, thread:'M16×1.5'},
  {bore:63,  rod:20, thread:'M16×1.5'},
  {bore:80,  rod:25, thread:'M20×1.5'},
  {bore:100, rod:32, thread:'M20×1.5'},
  {bore:125, rod:40, thread:'M27×2'},
  {bore:160, rod:50, thread:'M30×2'},
  {bore:200, rod:63, thread:'M36×2'},
  {bore:250, rod:80, thread:'M42×2'},
];

const BORE_OPTIONS=BORE_ROD_STD.map(p=>({v:String(p.bore),l:`Ø${p.bore}`}));

function getStdRod(bore){
  const found=BORE_ROD_STD.find(p=>p.bore===parseInt(bore));
  return found?found.rod:BORE_ROD_STD.reduce((a,b)=>Math.abs(b.bore-bore)<Math.abs(a.bore-bore)?b:a).rod;
}
function getStdThread(bore){
  const found=BORE_ROD_STD.find(p=>p.bore===parseInt(bore));
  return found?found.thread:'—';
}

const PistonForce=({onBack})=>{
  const [mode,setMode]=useState('push');
  const [d,setD]=useState(32);
  const [rod,setRod]=useState(16);   // ISO: Ø32 → Ø16
  const [rodIsStd,setRodIsStd]=useState(true);
  const [P,setP]=useState(6);

  const handleBore=(val)=>{
    const v=parseInt(val);
    setD(v);
    const stdRod=getStdRod(v);
    setRod(stdRod);
    setRodIsStd(true);
  };
  const handleRod=(val)=>{
    const v=parseFloat(val);
    if(isNaN(v)||v<=0)return;
    setRod(v);
    setRodIsStd(v===getStdRod(d));
  };

  const calc=useMemo(()=>{
    const A=mode==='push'?Math.PI/4*d*d:Math.PI/4*(d*d-rod*rod),F=P*0.1*A;
    return{A:A.toFixed(1),F:F.toFixed(1)};
  },[mode,d,rod,P]);
  return(
    <ToolLayout title="PistonForce Pro-Calc" subtitle="חישוב כוח בוכנות פנאומטיות / הידראוליות" onBack={onBack} accent={C.blue}>
      <TwoCol
        left={<div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
            {[{v:'push',l:'דחיפה (Push)',i:'→',c:C.blue},{v:'pull',l:'משיכה (Pull)',i:'←',c:C.orange}].map(m=>(
              <button key={m.v} onClick={()=>setMode(m.v)} style={{
                padding:'14px',borderRadius:12,cursor:'pointer',fontSize:14,fontWeight:700,
                fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'.04em',minHeight:52,
                background:mode===m.v?`${m.c}22`:C.card,border:`1px solid ${mode===m.v?m.c:C.border}`,
                color:mode===m.v?m.c:C.muted,transition:'all .2s',
                boxShadow:mode===m.v?`0 0 16px ${m.c}33`:undefined}}>
                {m.i} {m.l}
              </button>
            ))}
          </div>
          <ResultBig label="כוח תיאורטי מחושב" value={calc.F} unit="N" color={C.blue}
            sub={`F = P × 0.1 × A | A = ${calc.A} mm²`}/>
          {/* נתוני ציר תקניים */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:14}}>
            {[
              {l:'קוטר ציר (D)',v:`Ø${rod} mm`,c:C.blue},
              {l:'הברגה (ISO)',v:getStdThread(d),c:C.orange},
              {l:'שטח אפקטיבי',v:`${calc.A} mm²`,c:C.muted},
            ].map(r=>(
              <div key={r.l} style={{background:C.surf,border:`1px solid ${r.c}22`,borderRadius:10,
                padding:'10px 12px',textAlign:'center'}}>
                <div style={{color:C.muted,fontSize:9,fontWeight:700,letterSpacing:'.08em',marginBottom:5}}>{r.l}</div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",color:r.c,fontSize:14,fontWeight:600}}>{r.v}</div>
              </div>
            ))}
          </div>
          <Card style={{padding:22,marginBottom:14}}>
            <SectionLabel>סכמה מכנית</SectionLabel>
            <svg viewBox="0 0 380 120" width="100%" style={{display:'block',background:C.bg,borderRadius:10}}>
              <rect x="25" y="22" width="200" height="76" rx="4" fill={C.card} stroke={C.borderBright} strokeWidth="1.5"/>
              <rect x={mode==='push'?26:140} y="23" width={mode==='push'?115:84} height="74" fill={`${C.blue}15`} rx="3"/>
              <rect x={mode==='push'?138:76} y="18" width="6" height="84" fill={C.blue} rx="2"/>
              <rect x={mode==='push'?144:82} y="18" width="4" height="84" fill={`${C.blue}66`} rx="2"/>
              <rect x={mode==='push'?225:82} y="51" width="80" height="18" rx="3" fill={C.surf} stroke={C.borderBright} strokeWidth="1.2"/>
              <polygon points={mode==='push'?'310,51 330,60 310,69':'55,51 35,60 55,69'} fill={C.orange}/>
              <text x={mode==='push'?80:170} y="64" fill={`${C.blue}88`} fontSize="9" fontFamily="JetBrains Mono">{P} BAR</text>
              <line x1="20" y1="22" x2="20" y2="98" stroke={C.muted} strokeWidth=".8" strokeDasharray="3 2"/>
              <text x="8" y="64" fill={C.muted} fontSize="8" transform="rotate(-90,8,64)">d={d}</text>
            </svg>
          </Card>
        </div>}
        right={<Card style={{padding:20}}>
          <SectionLabel>פרמטרים הנדסיים</SectionLabel>

          {/* בחירת קוטר בוכנה — גדלים תקניים ISO */}
          <div style={{marginBottom:18}}>
            <div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'.07em',marginBottom:8}}>
              קוטר בוכנה (d) — גדלים תקניים ISO
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {BORE_OPTIONS.map(o=>(
                <button key={o.v} onClick={()=>handleBore(o.v)} style={{
                  padding:'7px 10px',borderRadius:7,cursor:'pointer',fontSize:12,
                  fontFamily:"'JetBrains Mono',monospace",fontWeight:600,minHeight:36,
                  border:`1px solid ${parseInt(o.v)===d?C.blue:C.border}`,
                  background:parseInt(o.v)===d?`${C.blue}22`:C.surf,
                  color:parseInt(o.v)===d?C.blue:C.muted,transition:'all .15s'}}>
                  {o.l}
                </button>
              ))}
            </div>
            <div style={{marginTop:8,background:`${C.blue}11`,border:`1px solid ${C.blue}22`,
              borderRadius:8,padding:'8px 12px',display:'flex',alignItems:'center',gap:10}}>
              <span style={{color:C.muted,fontSize:11}}>בוכנה נבחרת:</span>
              <span style={{fontFamily:"'Rajdhani'",color:C.blue,fontSize:22,fontWeight:700}}>Ø{d} mm</span>
            </div>
          </div>

          {/* קוטר מוט */}
          <div style={{marginBottom:6}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
              <span style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'.07em'}}>קוטר מוט (D)</span>
              <span style={{
                background:rodIsStd?`${C.green}22`:`${C.yellow}22`,
                border:`1px solid ${rodIsStd?C.green:C.yellow}44`,
                borderRadius:5,padding:'2px 8px',fontSize:9,fontWeight:700,

};

// ── T9: LINEAR GUIDE ──────────────────────────────────────────
const LinearGuide=({onBack})=>{
  const [H,setH]=useState(70);const [dv,setDv]=useState(10);
  const [b,setB]=useState(200);const [F,setF]=useState(5000);const [mu,setMu]=useState(0.3);
  const setNum=(setter)=>(v)=>{const n=parseFloat(v);if(!isNaN(n)&&n>0)setter(n);};
  const calc=useMemo(()=>{
    const SF=parseFloat(mu)*2*parseFloat(H)/parseFloat(dv);
    return{SF:isNaN(SF)?'—':SF.toFixed(2),safe:SF>=1.3,ratio:(parseFloat(dv)/(2*parseFloat(H))).toFixed(3)};
  },[H,dv,mu]);
  const ac=calc.safe?C.green:C.red;
  return(
    <ToolLayout title="Linear Guide — Self-Locking" subtitle="ניתוח כליבה ו-Binding במדריך ליניארי" onBack={onBack} accent={ac}>
      <TwoCol
        left={<div>
          <div style={{background:`${ac}0f`,border:`1px solid ${ac}44`,borderRadius:14,
            padding:'16px 20px',marginBottom:16,display:'flex',alignItems:'center',gap:14,
            boxShadow:`0 0 24px ${ac}22`,flexWrap:'wrap'}}>
            <div style={{width:44,height:44,borderRadius:'50%',background:`${ac}22`,border:`2px solid ${ac}`,
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,color:ac,flexShrink:0}}>
              {calc.safe?'✓':'✗'}
            </div>
            <div>
              <div style={{fontFamily:"'Rajdhani',sans-serif",color:ac,fontSize:20,fontWeight:700}}>
                {calc.safe?'מערכת בטוחה':'⚠ סכנת כליבה (Binding)'}
              </div>
              <div style={{color:C.muted,fontSize:12,marginTop:2}}>
                SF={calc.SF} — {calc.safe?'מעל סף המינימום (1.3)':'נמוך מ-1.3. כוח הדחיפה גדול מכוח החיכוך.'}
              </div>
            </div>
          </div>
          <div className="r-k3" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:16}}>
            <ResultSm label="מקדם חיכוך (μ)" value={mu} color={C.blue}/>
            <ResultSm label="יחסי כליבה (d/2H)" value={calc.ratio} color={parseFloat(calc.SF)<1.3?C.red:C.muted}/>
            <ResultBig label="מקדם בטיחות (SF)" value={calc.SF} color={ac}/>
          </div>
          <Card style={{padding:22,marginBottom:14}}>
            <SectionLabel>FREE BODY DIAGRAM (FBD)</SectionLabel>
            <svg viewBox="0 0 420 200" width="100%" style={{display:'block',background:C.bg,borderRadius:10,padding:8}}>
              <rect x="30" y="58" width="360" height="10" fill={C.borderBright} rx="2"/>
              <rect x="30" y="132" width="360" height="10" fill={C.borderBright} rx="2"/>
              <rect x={100+Math.min(parseFloat(b)*.06,60)} y="52" width={parseFloat(H)*1.3} height="96" fill={`${ac}18`} stroke={ac} strokeWidth="1.5" rx="3"/>
              <line x1={78+Math.min(parseFloat(b)*.06,60)} y1="52" x2={78+Math.min(parseFloat(b)*.06,60)} y2="148" stroke={C.white} strokeWidth="1" strokeDasharray="3 2"/>
              <text x={66+Math.min(parseFloat(b)*.06,60)} y="105" fill={C.white} fontSize="11" fontFamily="JetBrains Mono">H={H}</text>
              <circle cx={110+Math.min(parseFloat(b)*.06,60)} cy="70" r="5" fill={C.orange}/>
              <text x={116+Math.min(parseFloat(b)*.06,60)} y="68" fill={C.orange} fontSize="9">N2</text>
              <circle cx={100+parseFloat(H)*1.3+Math.min(parseFloat(b)*.06,60)} cy="140" r="5" fill={C.orange}/>
              <text x={106+parseFloat(H)*1.3+Math.min(parseFloat(b)*.06,60)} y="144" fill={C.orange} fontSize="9">N1</text>
              <polygon points="385,95 405,100 385,105" fill={C.yellow}/>
              <line x1={100+parseFloat(H)*1.3+Math.min(parseFloat(b)*.06,60)+5} y1="100" x2="385" y2="100" stroke={C.yellow} strokeWidth="1.5"/>
              <text x="392" y="98" fill={C.yellow} fontSize="11" fontFamily="JetBrains Mono">F</text>
              <text x="20" y="105" fill={C.muted} fontSize="8" transform="rotate(-90,20,100)" fontFamily="JetBrains Mono">d={dv}</text>
            </svg>
          </Card>
          <Card style={{padding:16}}>
            <SectionLabel>פעולות מתקנות</SectionLabel>
            <div className="r-notes" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
              {[{s:'μ',t:'הקטן מקדם חיכוך — מתחת ל-0.175'},{s:'H',t:'הגדל אורך מחליק — מינימום 151 מ"מ'},{s:'b',t:'הקטן זרוע כוח — מקסימום 93 מ"מ'}].map(a=>(
                <div key={a.s} style={{background:C.surf,borderRadius:8,padding:12}}>
                  <div style={{fontFamily:"'Rajdhani'",color:C.blue,fontSize:22,fontWeight:700,marginBottom:4}}>{a.s}</div>
                  <div style={{color:C.muted,fontSize:11,lineHeight:1.6}}>{a.t}</div>
                </div>
              ))}
            </div>
          </Card>
        </div>}
        right={<Card style={{padding:20}}>
          <SectionLabel>גיאומטריה ועומסים</SectionLabel>
          <Inp label='אורך מחליק (H) מ"מ' value={H} onChange={setNum(setH)} unit="mm" min="20" max="300" step="1"/>
          <Inp label='רוחב מחליק (d) מ"מ' value={dv} onChange={setNum(setDv)} unit="mm" min="5" max="80" step="1"/>
          <Inp label='זרוע כוח (b) מ"מ' value={b} onChange={setNum(setB)} unit="mm" min="0" max="500" step="1"/>
          <Inp label="כוח הפעלה (F)" value={F} onChange={setNum(setF)} unit="N" min="100" max="50000" step="1"/>
          <Inp label="מקדם חיכוך (μ)" value={mu} onChange={setNum(setMu)} unit="" min="0.01" max="1" step="0.001"/>
          <div style={{background:C.bg,borderRadius:10,padding:14,marginTop:6}}>
            <div style={{color:C.muted,fontSize:10,letterSpacing:'.1em',marginBottom:8}}>תנאי בטיחות</div>
            <div style={{color:C.muted,fontSize:12,fontFamily:'monospace',lineHeight:1.9}}>SF = μ × 2H / d<br/>SF ≥ 1.3 → ✓<br/>SF &lt; 1.0 → ✗</div>
          </div>
        </Card>}
      />
    </ToolLayout>
  );
};

const KW_DATA=[

const KeywayDesign=({onBack})=>{
  const [d,setD]=useState(30);

  const center=(d/2+kw.t2).toFixed(2);
  const sc=90/(d/2);
  return(
    <ToolLayout title="Keyway Design Tool" subtitle="DIN 6885-1 / ISO 773" onBack={onBack} accent={C.blue}>
      <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
        <Badge>N9 — Standard Fit</Badge><Badge color={C.orange}>DIN 6885-1 / ISO 773</Badge>
      </div>
      <TwoCol
        left={<div>
          <Card style={{padding:24,marginBottom:16}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
              <div style={{color:C.white,fontSize:14,fontWeight:600}}>שרטוט טכני — חתך רוחב</div>
              <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                {[{l:'T2:HUB',c:C.orange},{l:'T1:SHAFT',c:C.blue}].map(b=>(
                  <span key={b.l} style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:b.c}}>

            <div style={{display:'flex',justifyContent:'center',background:C.bg,borderRadius:10,padding:'16px 8px'}}>
              {(()=>{
                const cx=150,cy=220,r=90;
                const sc=r*2/d;
                const bPx=Math.max(20,kw.b*sc);
                const t1Px=Math.max(12,kw.t1*sc);
                const t2Px=Math.max(10,kw.t2*sc);
                const hPx=t1Px+t2Px;
                // Key positions
                const shSurf=cy-r;          // shaft outer surface y
                const slotTop=shSurf-t2Px;  // top of hub zone
                const slotBot=shSurf+t1Px;  // bottom of shaft groove
                const slotL=cx-bPx/2;
                const slotR=cx+bPx/2;
                // Dimension zones
                const leftDim=slotL-16;      // t1/t2 arrow x
                const leftTxt=slotL-20;      // t1/t2 text x (end)
                const hDimX=slotR+18;        // h dim line x
                const hTxtX=slotR+36;        // h text x
                const farX=cx+r+52;          // d/2+t2 dim x
                const farTxtX=cx+r+74;       // d/2+t2 text x
                const bDimY=slotTop-20;      // b dim line y
                const bTxtY=slotTop-35;      // b text y
                return(
                  <svg viewBox="0 0 390 335" width="100%" style={{maxHeight:335}}>
                    <defs>
                      <pattern id="kwH" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                        <line x1="0" y1="0" x2="0" y2="5" stroke={C.borderBright} strokeWidth="0.8"/>
                      </pattern>
                      <clipPath id="kwC"><circle cx={cx} cy={cy} r={r}/></clipPath>
                      <marker id="kwUp" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="5" markerHeight="5" orient="270"><polygon points="0,1 8,4 0,7" fill={C.muted}/></marker>
                      <marker id="kwDn" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="5" markerHeight="5" orient="90"><polygon points="0,1 8,4 0,7" fill={C.muted}/></marker>
                      <marker id="kwL" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="5" markerHeight="5" orient="180"><polygon points="0,1 8,4 0,7" fill={C.muted}/></marker>
                      <marker id="kwR" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="5" markerHeight="5" orient="0"><polygon points="0,1 8,4 0,7" fill={C.muted}/></marker>
                    </defs>

                    {/* Center lines */}
                    <line x1={cx} y1="4" x2={cx} y2="326" stroke={C.dim} strokeWidth="0.7" strokeDasharray="10 4 2 4"/>
                    <line x1="4" y1={cy} x2={farX+40} y2={cy} stroke={C.dim} strokeWidth="0.7" strokeDasharray="10 4 2 4"/>

                    {/* Shaft — hatched circle */}
                    <circle cx={cx} cy={cy} r={r} fill={`${C.blue}12`}/>
                    <circle cx={cx} cy={cy} r={r} fill="url(#kwH)" opacity="0.25" clipPath="url(#kwC)"/>

                    {/* ── KEYWAY SLOT ── */}
                    {/* Shaft portion (t1) — cut into shaft, shown as void */}
                    <rect x={slotL} y={shSurf} width={bPx} height={t1Px} fill={C.bg}/>
                    <line x1={slotL} y1={shSurf} x2={slotL} y2={slotBot} stroke={C.borderBright} strokeWidth="2"/>
                    <line x1={slotR} y1={shSurf} x2={slotR} y2={slotBot} stroke={C.borderBright} strokeWidth="2"/>
                    <line x1={slotL} y1={slotBot} x2={slotR} y2={slotBot} stroke={C.borderBright} strokeWidth="2"/>

                    {/* Hub portion (t2) — above shaft surface, orange dashed outline */}
                    <rect x={slotL} y={slotTop} width={bPx} height={t2Px}
                      fill={`${C.orange}1a`} stroke={C.orange} strokeWidth="1.3" strokeDasharray="6 3"/>

                    {/* ══ DIMENSIONS ══ */}

                    {/* ── b (width) — top, full span ── */}
                    <line x1={slotL} y1={bDimY} x2={slotR} y2={bDimY} stroke={C.blue} strokeWidth="1.4"
                      markerStart="url(#kwL)" markerEnd="url(#kwR)"/>
                    <line x1={slotL} y1={bDimY+4} x2={slotL} y2={slotTop-2} stroke={C.blue} strokeWidth="0.7"/>
                    <line x1={slotR} y1={bDimY+4} x2={slotR} y2={slotTop-2} stroke={C.blue} strokeWidth="0.7"/>
                    <rect x={cx-38} y={bTxtY-13} width={76} height={16} fill={C.bg} rx="2"/>
                    <text x={cx} y={bTxtY} textAnchor="middle" fill={C.blue} fontSize="14" fontFamily="JetBrains Mono" fontWeight="700">b = {kw.b}</text>

                    {/* ── t2 — left, shaft surface → hub top ── */}
                    <line x1={leftDim-10} y1={shSurf} x2={slotL-3} y2={shSurf} stroke={C.orange} strokeWidth="0.8"/>

                    <line x1={leftDim} y1={shSurf} x2={leftDim} y2={slotTop} stroke={C.orange} strokeWidth="1.3"
                      markerStart="url(#kwDn)" markerEnd="url(#kwUp)"/>
                    <rect x={leftTxt-40} y={(shSurf+slotTop)/2-9} width={38} height={18} fill={C.bg} rx="2"/>
                    <text x={leftTxt} y={(shSurf+slotTop)/2+6} textAnchor="end" fill={C.orange} fontSize="13" fontFamily="JetBrains Mono" fontWeight="700">t2</text>

                    {/* ── t1 — left, shaft surface → groove bottom ── */}
                    <line x1={leftDim-10} y1={shSurf} x2={slotL-3} y2={shSurf} stroke={C.blue} strokeWidth="0.8"/>
                    <line x1={leftDim-10} y1={slotBot} x2={slotL-3} y2={slotBot} stroke={C.blue} strokeWidth="0.8"/>
                    <line x1={leftDim} y1={shSurf} x2={leftDim} y2={slotBot} stroke={C.blue} strokeWidth="1.3"
                      markerStart="url(#kwUp)" markerEnd="url(#kwDn)"/>
                    <rect x={leftTxt-40} y={(shSurf+slotBot)/2-9} width={38} height={18} fill={C.bg} rx="2"/>
                    <text x={leftTxt} y={(shSurf+slotBot)/2+6} textAnchor="end" fill={C.blue} fontSize="13" fontFamily="JetBrains Mono" fontWeight="700">t1</text>

                    {/* ── h — right of slot, full height (t1+t2) ── */}
                    <line x1={slotR+3} y1={slotTop} x2={hDimX+10} y2={slotTop} stroke={C.white} strokeWidth="0.8"/>
                    <line x1={slotR+3} y1={slotBot} x2={hDimX+10} y2={slotBot} stroke={C.white} strokeWidth="0.8"/>
                    <line x1={hDimX} y1={slotTop} x2={hDimX} y2={slotBot} stroke={C.white} strokeWidth="1.3"
                      markerStart="url(#kwUp)" markerEnd="url(#kwDn)"/>
                    <rect x={hTxtX-9} y={(slotTop+slotBot)/2-40} width={20} height={80} fill={C.bg} rx="2"/>
                    <text x={hTxtX} y={(slotTop+slotBot)/2+5} textAnchor="middle" fill={C.white} fontSize="13" fontFamily="JetBrains Mono" fontWeight="700"
                      transform={`rotate(-90,${hTxtX},${(slotTop+slotBot)/2})`}>h = {kw.h}</text>

                    {/* ── d/2 + t2 — far right, center to hub top ── */}
                    <line x1={cx+r+4} y1={cy} x2={farX+10} y2={cy} stroke={`${C.green}55`} strokeWidth="0.7" strokeDasharray="4 3"/>
                    <line x1={slotR+3} y1={slotTop} x2={farX+10} y2={slotTop} stroke={`${C.green}55`} strokeWidth="0.7" strokeDasharray="4 3"/>
                    <line x1={farX} y1={cy} x2={farX} y2={slotTop} stroke={C.green} strokeWidth="1.5"
                      markerStart="url(#kwUp)" markerEnd="url(#kwDn)"/>
                    <rect x={farTxtX-11} y={(cy+slotTop)/2-58} width={24} height={116} fill={C.bg} rx="2"/>
                    <text x={farTxtX} y={(cy+slotTop)/2+5} textAnchor="middle" fill={C.green} fontSize="13" fontFamily="JetBrains Mono" fontWeight="700"
                      transform={`rotate(-90,${farTxtX},${(cy+slotTop)/2})`}>d/2 + t2 = {center}</text>

                    {/* Bottom label */}
                    <text x={cx} y="328" textAnchor="middle" fill={C.muted} fontSize="10" fontFamily="JetBrains Mono">חתך ציר — DIN 6885-1</text>
                  </svg>
                );
              })()}
            </div>
          </Card>
          <Card style={{overflow:'hidden'}}>
            <div style={{padding:'11px 16px',background:C.surf,borderBottom:`1px solid ${C.border}`,display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
              <Badge color={C.orange}>DIN 6885-1</Badge>
              <span style={{color:C.muted,fontSize:12}}>ערכים לייצור וביקורת (mm)</span>
            </div>
            <div className="tbl-wrap">
              <table style={{width:'100%',borderCollapse:'collapse',minWidth:380}}>

                const ty=cy-shR,by=cy+shR;
                const mc=C.muted;

                        </g>
                      );
                    })()}

                    {/* ── d2: groove diameter ── */}
                    {(()=>{
                      const gY1=type==='471'?ty+grD:cy-grR472, gY2=type==='471'?by-grD:cy+grR472;
                      const d2X=gx1-26;
                      return(
                        <g>
                          <line x1={d2X+14} y1={gY1} x2={gx1-2} y2={gY1} stroke={acc} strokeWidth="0.8"/>
                          <line x1={d2X+14} y1={gY2} x2={gx1-2} y2={gY2} stroke={acc} strokeWidth="0.8"/>
                          <line x1={d2X+8} y1={gY1+5} x2={d2X+8} y2={cy-7} stroke={acc} strokeWidth="1" markerEnd={`url(#sah${type})`}/>
                          <line x1={d2X+8} y1={gY2-5} x2={d2X+8} y2={cy+7} stroke={acc} strokeWidth="1" markerEnd={`url(#sah${type})`}/>
                          <rect x={d2X-1} y={cy-9} width={20} height={18} fill={C.bg} rx="2"/>
                          <text x={d2X+8} y={cy+4} textAnchor="middle" fill={acc} fontSize="11" fontFamily="JetBrains Mono" fontWeight="700" transform={`rotate(-90,${d2X+8},${cy})`}>Ø{row.d2}</text>
                        </g>
                      );
                    })()}

                    {/* ── m: groove width — full span, text well above line ── */}
                    {(()=>{
                      const abY=type==='471'?ty-46:wty-46;
                      return(
                        <g>
                          <line x1={gx1} y1={abY+26} x2={gx1} y2={type==='471'?ty:wty} stroke={C.yellow} strokeWidth="0.7" strokeDasharray="3 3"/>
                          <line x1={gx2} y1={abY+26} x2={gx2} y2={type==='471'?ty:wty} stroke={C.yellow} strokeWidth="0.7" strokeDasharray="3 3"/>
                          <line x1={gx1} y1={abY+22} x2={gx2} y2={abY+22} stroke={C.yellow} strokeWidth="1.4" markerStart={`url(#sat${type})`} markerEnd={`url(#sah${type})`}/>
                          <rect x={gmx-32} y={abY+4} width={64} height={16} fill={C.bg} rx="2"/>
                          <text x={gmx} y={abY+16} textAnchor="middle" fill={C.yellow} fontSize="12" fontFamily="JetBrains Mono" fontWeight="700">m = {row.m}</text>
                        </g>
                      );
                    })()}

                    {/* ── n: edge distance — full span, text below with clearance ── */}
                    {(()=>{
                      const belY=type==='471'?by+22:wby+22;
                      return(
                        <g>
                          <line x1={sx} y1={belY-4} x2={sx} y2={belY+14} stroke={C.green} strokeWidth="0.9"/>
                          <line x1={gx1} y1={belY-4} x2={gx1} y2={belY+14} stroke={C.green} strokeWidth="0.9"/>
                          <line x1={sx} y1={belY+4} x2={gx1} y2={belY+4} stroke={C.green} strokeWidth="1.4" markerStart={`url(#sat${type})`} markerEnd={`url(#sah${type})`}/>
                          <rect x={(sx+gx1)/2-32} y={belY+14} width={64} height={16} fill={C.bg} rx="2"/>
                          <text x={(sx+gx1)/2} y={belY+26} textAnchor="middle" fill={C.green} fontSize="12" fontFamily="JetBrains Mono" fontWeight="700">n = {row.n}</text>
                        </g>
                      );
                    })()}
                  </svg>
                );
              })()}
            </div>
            <div className="r-k4" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
              {[{l:'ציר d',v:row.d,u:'mm',c:C.white},{l:'חריץ d2',v:row.d2,u:'mm',c:C.blue},{l:'רוחב m',v:row.m,u:'mm',c:C.red},{l:'קצה n',v:row.n,u:'mm',c:C.yellow}].map(r=>(
                <div key={r.l} style={{background:C.surf,borderRadius:9,padding:12,textAlign:'center',border:`1px solid ${r.c}22`}}>
                  <div style={{color:C.muted,fontSize:10,marginBottom:5}}>{r.l}</div>
                  <div style={{fontFamily:"'Rajdhani'",color:r.c,fontSize:22,fontWeight:700}}>{r.v}</div>
                  <div style={{color:C.muted,fontSize:10}}>{r.u}</div>
                </div>
              ))}
            </div>
          </Card>}
          <Card style={{padding:14}}>
            <div style={{color:C.muted,fontSize:12,lineHeight:1.7}}>
              DIN 471 לצירים ו-DIN 472 לקדחים. רוחב m כולל טולרנס חיובי לאפשר הרכבה. מרחק n מהקצה הינו מינימלי.
            </div>
          </Card>
        </div>}
        right={<Card style={{padding:20}}>

          {row&&<div>{[{l:'קוטר חריץ d2',v:`${row.d2} mm`,c:C.blue},{l:'רוחב חריץ m',v:`${row.m} mm`,c:C.red},{l:'מרחק קצה n',v:`${row.n} mm`,c:C.yellow}].map(r=>(

};

// ── T13: NMRV CALCULATOR ──────────────────────────────────────
const NMRVCalculator=({onBack})=>{
  const [kw,setKw]=useState('0.75');const [spd,setSpd]=useState('1400');
  const [sz,setSz]=useState('063');const [ratio,setRatio]=useState('20');
  const calc=useMemo(()=>{
    const eff=(NMRV_EFF[parseInt(sz)]||82)/100,i=parseFloat(ratio),n=parseFloat(spd),P=parseFloat(kw);
    return{eff:(eff*100).toFixed(0),n_out:(n/i).toFixed(1),torque:(P*eff*i*9550/n).toFixed(1),shaft:NMRV_SHAFT[parseInt(sz)]||25};
  },[kw,spd,sz,ratio]);
  return(
    <ToolLayout title="מחשבון מנוע וגיר NMRV" subtitle="חישוב מומנט ונתונים טכניים עם ויזואליזציה" onBack={onBack} accent={C.orange}>

                </svg>
                <div style={{color:C.blue,fontSize:11,fontWeight:600}}>{kw} kW</div>
                <div style={{color:C.muted,fontSize:10}}>{spd} RPM</div>

              <div style={{color:C.dim,fontSize:20}}>→</div>

                <svg viewBox="0 0 80 80" width="72" height="72">
                  <rect x="5" y="5" width="70" height="70" rx="8" fill={C.surf} stroke={C.borderBright} strokeWidth="1.5"/>
                  {[0,45,90,135,180,225,270,315].map(a=>{const r=28,cx=40+r*Math.cos(a*Math.PI/180),cy=40+r*Math.sin(a*Math.PI/180);return<circle key={a} cx={cx} cy={cy} r="4" fill={C.card} stroke={C.borderBright} strokeWidth="1"/>;})}

      <div className="r-filter" style={{padding:'20px 44px 0',maxWidth:1120,margin:'0 auto'}}>
        <div style={{display:'flex',gap:7,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:'.12em',marginLeft:6}}>FILTER:</span>
          {cats.map(c=>{
            const ac=CAT_C[c]||C.blue,active=cat===c;
            return(
              <button key={c} onClick={()=>setCat(c)} style={{
                padding:'7px 14px',borderRadius:8,cursor:'pointer',fontSize:12,fontWeight:600,
                fontFamily:"'Barlow',sans-serif",transition:'all .2s',minHeight:36,
                background:active?`${ac}22`:C.card,border:`1px solid ${active?ac:C.border}`,
                color:active?ac:C.muted,boxShadow:active?`0 0 8px ${ac}22`:undefined}}>
                {active&&<span style={{marginLeft:3}}>●</span>} {c}
              </button>
            );
          })}
        </div>
      </div>

      {/* Grid */}
      <div className="r-tool-grid" style={{padding:'20px 44px 56px',maxWidth:1120,margin:'0 auto',
        display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
        {filtered.map(t=><ToolCard key={t.id} tool={t} onClick={()=>onSelect(t.id)}/>)}
      </div>

      <div style={{borderTop:`1px solid ${C.border}`,padding:'14px 44px',
        display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
        <div style={{color:C.dim,fontSize:12}}>כלי עזר פנימיים — מחלקת הנדסת מכונות</div>
        <div style={{display:'flex',gap:10}}>
          {[C.blue,C.orange,C.green].map((c,i)=><div key={i} style={{width:5,height:5,borderRadius:'50%',background:c,opacity:.5}}/>)}
        </div>
      </div>
    </div>
  );
};

// ── APP ───────────────────────────────────────────────────────
function App(){
  const [active,setActive]=useState(null);
  const map=Object.fromEntries(TOOLS.map(t=>[t.id,t.comp]));
  const Comp=active?map[active]:null;
  return(
    <>
      <style>{CSS}</style>
      {Comp?<Comp onBack={()=>setActive(null)}/>:<LandingPage onSelect={setActive}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
