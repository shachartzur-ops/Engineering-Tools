// ── GEAR POINTS UTILITY ───────────────────────────────────────
function gearPts(cx, cy, r, teeth, ratio=0.17) {
  const inner = r*(1-ratio);
  const pts = [];
  for(let i=0;i<teeth;i++){
    const a1=(i/teeth)*2*Math.PI-Math.PI/2;
    const a2=((i+0.3)/teeth)*2*Math.PI-Math.PI/2;
    const a3=((i+0.7)/teeth)*2*Math.PI-Math.PI/2;
    const a4=((i+1)/teeth)*2*Math.PI-Math.PI/2;
    pts.push(`${cx+inner*Math.cos(a1)},${cy+inner*Math.sin(a1)}`);
    pts.push(`${cx+r*Math.cos(a2)},${cy+r*Math.sin(a2)}`);
    pts.push(`${cx+r*Math.cos(a3)},${cy+r*Math.sin(a3)}`);
    pts.push(`${cx+inner*Math.cos(a4)},${cy+inner*Math.sin(a4)}`);
  }
  return pts.join(' ');
}

// ── ANIMATED NUMBER ───────────────────────────────────────────
const AnimatedNumber = ({value, color, size=44}) => {
  const [disp, setDisp] = useState(value);
  const raf = useRef(null);
  const prev = useRef(value);

  useEffect(() => {
    const a = parseFloat(String(prev.current));
    const b = parseFloat(String(value));
    prev.current = value;
    if(isNaN(a)||isNaN(b)||Math.abs(b-a)<0.001){setDisp(value);return;}
    const dec = (String(value).split('.')[1]||'').length;
    const dur = 380;
    const t0 = performance.now();
    if(raf.current) cancelAnimationFrame(raf.current);
    const tick = t => {
      const p = Math.min((t-t0)/dur,1);
      const e = 1-(1-p)**3;
      const v = a+(b-a)*e;
      setDisp(dec>0?v.toFixed(dec):String(Math.round(v)));
      if(p<1) raf.current=requestAnimationFrame(tick);
      else setDisp(value);
    };
    raf.current = requestAnimationFrame(tick);
    return ()=>{ if(raf.current) cancelAnimationFrame(raf.current); };
  },[value]);

  return <span style={{fontFamily:"'Share Tech Mono',monospace",color,fontSize:size,fontWeight:700,lineHeight:1}}>{disp}</span>;
};

const Slider = ({label,value,onChange,min,max,step=1,color=C.blue,unit}) => {
  const [txt,setTxt] = useState(String(value));
  const [synced,setSynced] = useState(value);
  if(value!==synced){setSynced(value);setTxt(String(value));}
  const pct = Math.min(100,Math.max(0,((value-min)/(max-min)*100))).toFixed(1);
  const sel = e=>{const t=e.target;setTimeout(()=>t.select(),0);};
  const handleSlider = e=>{const v=parseFloat(e.target.value);onChange(v);setTxt(String(v));};
  const handleType = e=>{
    setTxt(e.target.value);
    const n=parseFloat(e.target.value);
    if(!isNaN(n))onChange(Math.min(Math.max(n,min),max));
  };
  const handleBlur = ()=>{
    const n=parseFloat(txt);
    if(isNaN(n)||n<min){onChange(min);setTxt(String(min));}
    else if(n>max){onChange(max);setTxt(String(max));}
    else{const r=Math.round(n*10000)/10000;setTxt(String(r));}
  };
  return(
    <div style={{marginBottom:18}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7,gap:8}}>
        <div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'.07em',flex:1,minWidth:0,
          overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:"'Barlow Condensed'"}}>{label}</div>
        <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
          <input type="number" value={txt} onChange={handleType} onBlur={handleBlur}
            onFocus={sel} onClick={sel} min={min} max={max} step={step}
            style={{width:72,background:`${color}11`,border:`1px solid ${color}55`,borderRadius:7,
              color,padding:'5px 8px',fontSize:13,fontFamily:"'Share Tech Mono',monospace",
              fontWeight:600,textAlign:'center',transition:'border-color .2s'}}/>
          {unit&&<span style={{color,fontSize:11,opacity:.7,minWidth:20,textAlign:'left',fontFamily:"'Barlow'"}}>{unit}</span>}
        </div>
      </div>
      <input type="range" min={min} max={max} step={step} value={value} onChange={handleSlider}
        style={{width:'100%',accentColor:color,cursor:'pointer',
          background:`linear-gradient(90deg,${color} ${pct}%,${C.borderB} ${pct}%)`}}/>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:2}}>
        <span style={{color:C.dim,fontSize:10,fontFamily:"'Share Tech Mono',monospace"}}>{min}</span>
        <span style={{color:C.dim,fontSize:10,fontFamily:"'Share Tech Mono',monospace"}}>{max}</span>
      </div>
    </div>
  );
};

const BearingSVG = ({caseId,size=150,animated}) => {
  const cx=size/2, cy=size/2, r=size*0.44, innerR=size*0.27, cageR=size*0.36;
  const hatchSize=size*0.015;
  return(
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>
      <defs>
        <pattern id={`bph${caseId}`} width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="5" stroke={C.borderBright} strokeWidth="0.8"/>
        </pattern>
        <clipPath id={`bpc${caseId}o`}><circle cx={cx} cy={cy} r={r}/></clipPath>
        <clipPath id={`bpc${caseId}i`}><circle cx={cx} cy={cy} r={innerR}/></clipPath>
        <radialGradient id={`rg${caseId}`} cx="50%" cy="35%" r="60%">
          <stop offset="0%" stopColor={C.borderBright} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={C.bg} stopOpacity="0"/>
        </radialGradient>
      </defs>
      {/* Outer race hatching */}
      <circle cx={cx} cy={cy} r={r} fill={`url(#bph${caseId})`} opacity="0.3" clipPath={`url(#bpc${caseId}o)`}/>
      {/* Outer race */}
      <circle cx={cx} cy={cy} r={r} fill={`${C.blue}08`} stroke={caseId===2?C.orange:C.borderBright} strokeWidth="2.5"
        style={animated&&caseId===2?{transformOrigin:`${cx}px ${cy}px`,animation:'rotateRing 8s linear infinite'}:undefined}/>
      {/* Cage */}
      <circle cx={cx} cy={cy} r={cageR} fill="none" stroke={C.borderB} strokeWidth="0.6" strokeDasharray="3 2"/>
      {/* Balls */}
      {[0,45,90,135,180,225,270,315].map((a,i)=>{
        const bx=cx+cageR*Math.cos(a*Math.PI/180), by=cy+cageR*Math.sin(a*Math.PI/180);
        return(
          <g key={i}>
            <circle cx={bx} cy={by} r={size*0.055} fill={`${C.borderBright}55`} stroke={C.borderBright} strokeWidth="1.2"/>
            <circle cx={bx-size*0.012} cy={by-size*0.012} r={size*0.018} fill={C.white} opacity="0.25"/>
          </g>
        );
      })}
      {/* Inner race */}
      <circle cx={cx} cy={cy} r={innerR} fill={`url(#bph${caseId})`} opacity="0.25" clipPath={`url(#bpc${caseId}i)`}/>
      <circle cx={cx} cy={cy} r={innerR} fill={`${C.blue}10`} stroke={caseId===1?C.orange:C.borderBright} strokeWidth="2.5"
        style={animated&&caseId===1?{transformOrigin:`${cx}px ${cy}px`,animation:'rotateRev 5s linear infinite'}:undefined}/>
      {/* Bore */}
      <circle cx={cx} cy={cy} r={size*0.15} fill={C.surf} stroke={C.borderB} strokeWidth="1.2"/>
      {/* Center lines */}
      <line x1={cx} y1={cy-size*0.1} x2={cx} y2={cy+size*0.1} stroke={C.dim} strokeWidth="0.6" strokeDasharray="3 2"/>
      <line x1={cx-size*0.1} y1={cy} x2={cx+size*0.1} y2={cy} stroke={C.dim} strokeWidth="0.6" strokeDasharray="3 2"/>
      {/* Dimension lines */}
      <line x1={cx} y1={size*0.04} x2={cx} y2={size*0.12} stroke={C.blue} strokeWidth="0.8" opacity="0.5"/>

      {/* Highlight */}
      <circle cx={cx} cy={cy} r={r} fill={`url(#rg${caseId})`}/>
    </svg>
  );
};

const IEC_MOTORS=[

  const [mass,setMass]=useState(50);const [rad,setRad]=useState(30);

    const motor=IEC_MOTORS.find(m=>m.kw>=P_req)||IEC_MOTORS[IEC_MOTORS.length-1];
    return{F:F.toFixed(1),P_th:P_th.toFixed(4),P_req:P_req.toFixed(4),omega:omega.toFixed(1),rpm:rpm.toFixed(1),torque:torque.toFixed(1),motor};

          <Inp label="מקדם בטיחון (SF)" value={sf} onChange={setSf} unit="" min="1.0" max="2.5" step="0.1"/>
          <div style={{background:C.surf,borderRadius:10,padding:14,marginTop:6}}>
            <div style={{color:C.muted,fontSize:10,letterSpacing:'.1em',marginBottom:8,fontFamily:"'Barlow Condensed'"}}>נוסחאות</div>

const CORE_IDS=[{v:'76.2',l:'3" (76.2 mm)'},{v:'152.4',l:'6" (152.4 mm)'},{v:'76',l:'76 mm'},{v:'150',l:'150 mm'}];
const FilmRollWeight = ({onBack}) => {
  const [mat,setMat]=useState('HDPE');const [core,setCore]=useState('cardboard');

              {[['V_film','(π/4)×(OD²-ODc²)×W×0.97'],['L_film','V/(W×t)/100'],['M_film','V×ρ/1000'],['M_total','Mf+Mc']].map(([k,v])=>(

                <svg viewBox="0 0 80 80" width="72" height="72">

// ── TOOL CARD ─────────────────────────────────────────────────
const ToolCard = ({tool,onClick}) => {
  const [hov,setHov] = useState(false);
  const [tilt,setTilt] = useState({x:0,y:0});
  const cardRef = useRef(null);
  const handleMove = (e) => {
    if(!cardRef.current) return;
    const r = cardRef.current.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width - 0.5;
    const y = (e.clientY - r.top) / r.height - 0.5;
    setTilt({x: y*9, y: -x*9});
  };
  const handleLeave = () => { setHov(false); setTilt({x:0,y:0}); };
  return(
    <div ref={cardRef} className="tool-card" onClick={onClick}
      onMouseEnter={()=>setHov(true)} onMouseLeave={handleLeave} onMouseMove={handleMove}
      style={{
        background: hov ? C.cardH : C.card,
        borderRadius:16, padding:'20px 20px 18px', cursor:'pointer',
        border:`1px solid ${hov ? tool.c+'55' : C.border}`,
        boxShadow: hov ? `0 14px 42px ${tool.c}30, inset 0 1px 0 ${tool.c}22` : `0 2px 8px ${C.bg}`,
        transform: hov
          ? `perspective(700px) rotateX(${tilt.x}deg) rotateY(${tilt.y}deg) translateY(-5px)`
          : 'perspective(700px) rotateX(0) rotateY(0) translateY(0)',
        transition: hov ? 'box-shadow .2s,border .2s,background .2s' : 'all .4s cubic-bezier(.2,.8,.3,1)',
        position:'relative', overflow:'hidden', minHeight:44,
        willChange:'transform',
      }}>

// ── PARTICLE CANVAS ───────────────────────────────────────────
const ParticleCanvas = () => {
  const ref = useRef(null);
  useEffect(()=>{
    const cv = ref.current; if(!cv) return;
    const ctx = cv.getContext('2d');
    const resize = ()=>{ cv.width=cv.offsetWidth; cv.height=cv.offsetHeight; };
    resize();
    window.addEventListener('resize',resize);
    const pts = Array.from({length:38},()=>({
      x:Math.random()*cv.width, y:Math.random()*cv.height,
      vx:(Math.random()-.5)*0.32, vy:(Math.random()-.5)*0.32,
      r:Math.random()*2.2+0.8, op:Math.random()*0.55+0.2,
    }));
    let raf;
    const draw=()=>{
      ctx.clearRect(0,0,cv.width,cv.height);
      pts.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0)p.x=cv.width; if(p.x>cv.width)p.x=0;
        if(p.y<0)p.y=cv.height; if(p.y>cv.height)p.y=0;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(74,158,255,${p.op})`; ctx.fill();
      });
      for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
        const d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);
        if(d<110){ ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`rgba(74,158,255,${0.18*(1-d/110)})`; ctx.lineWidth=0.8; ctx.stroke(); }
      }
      raf=requestAnimationFrame(draw);
    };
    draw();
    return()=>{ cancelAnimationFrame(raf); window.removeEventListener('resize',resize); };
  },[]);
  return <canvas ref={ref} style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:0}}/>;
};

    return()=>clearInterval(t);
  },[]);
  return(
    <div style={{textAlign:'center'}}>
      <div style={{fontFamily:"'Exo 2',sans-serif",fontSize:30,fontWeight:700,color:C.blue}}>{val}{suffix}</div>
      <div style={{color:C.muted,fontSize:11,letterSpacing:'.04em',fontFamily:"'Barlow Condensed'"}}>{label}</div>
    </div>
  );
};

// ── APP ───────────────────────────────────────────────────────
function App(){
  const [active,setActive] = useState(null);
  const [scanning,setScanning] = useState(false);

  const selectTool = id => {
    setScanning(true);
    setTimeout(()=>{setActive(id);setScanning(false);},280);
  };

  const goBack = () => {
    setScanning(true);
    setTimeout(()=>{setActive(null);setScanning(false);},280);
  };

  const map = Object.fromEntries(TOOLS.map(t=>[t.id,t.comp]));
  const Comp = active ? map[active] : null;

  return(
    <>
      <style>{CSS}</style>
      {scanning && <div className="scan-overlay"/>}
      {Comp
        ? <Comp onBack={goBack} key={active}/>
        : <LandingPage onSelect={selectTool}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
