function gearPts(cx, cy, r, teeth, ratio=0.17) {
  const inner = r*(1-ratio);
  const pts = [];
  for(let i=0;i<teeth;i++){
    const a1=(i/teeth)*2*Math.PI-Math.PI/2;
    const a2=((i+0.3)/teeth)*2*Math.PI-Math.PI/2;
    const a3=((i+0.7)/teeth)*2*Math.PI-Math.PI/2;
    const a4=((i+1)/teeth)*2*Math.PI-Math.PI/2;
    pts.push(`${cx+inner*Math.cos(a1)},${cy+inner*Math.sin(a1)}`);
    pts.push(`${cx+r*Math.cos(a2)},${cy+r*Math.sin(a2)}`);
    pts.push(`${cx+r*Math.cos(a3)},${cy+r*Math.sin(a3)}`);
    pts.push(`${cx+inner*Math.cos(a4)},${cy+inner*Math.sin(a4)}`);
  }
  return pts.join(' ');
}

const AnimatedNumber = ({value, color, size=44}) => {
  const [disp, setDisp] = useState(value);
  const raf = useRef(null);
  const prev = useRef(value);
  useEffect(() => {
    const a = parseFloat(String(prev.current));
    const b = parseFloat(String(value));
    prev.current = value;
    if(isNaN(a)||isNaN(b)||Math.abs(b-a)<0.001){setDisp(value);return;}
    const dec = (String(value).split('.')[1]||'').length;
    const dur = 380, t0 = performance.now();
    if(raf.current) cancelAnimationFrame(raf.current);
    const tick = t => {
      const p = Math.min((t-t0)/dur,1), e = 1-(1-p)**3, v = a+(b-a)*e;
      setDisp(dec>0?v.toFixed(dec):String(Math.round(v)));
      if(p<1) raf.current=requestAnimationFrame(tick); else setDisp(value);
    };
    raf.current = requestAnimationFrame(tick);
    return ()=>{ if(raf.current) cancelAnimationFrame(raf.current); };
  },[value]);
  return <span style={{fontFamily:"'Share Tech Mono',monospace",color,fontSize:size,fontWeight:700,lineHeight:1}}>{disp}</span>;
};

      <rect x={h*0.04} y={h*0.72} width={h*1.06} height={h*0.56} rx={5} fill={`${c}14`} stroke={c} strokeWidth={sw}/>
      {[0.14,0.3,0.46,0.62,0.78,0.94].map((x,i)=>(<ellipse key={i} cx={h*(0.04+x)} cy={h} rx={h*0.07} ry={h*0.22} fill="none" stroke={c} strokeWidth={sw*0.5} opacity="0.35"/>))}
      <polygon points={`${h*0.62},${h*0.72} ${h*0.78},${h*0.72} ${h*0.72},${h*0.36} ${h*0.68},${h*0.36}`} fill={`${c}20`} stroke={c} strokeWidth={sw*0.8}/>

      <rect x={h*1.47} y={h*1.08} width={h*0.3} height={h*0.34} rx={2} fill={C.bg} stroke={c} strokeWidth={sw*0.7}/>
      <line x1={h*1.62} y1={h*0.04} x2={h*1.62} y2={h*0.16} stroke={C.orange} strokeWidth={sw*1.4}/>

      <line x1={h*0.55} y1={h} x2={h*1.28} y2={h} stroke={C.blue} strokeWidth={sw*0.8} strokeDasharray="4 2" opacity="0.6"/>

    </g>),
  };
  const ico = icons[id] || icons.bearings;
  return (<svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} style={{display:'block',overflow:'visible'}}>{ico}</svg>);
};

const Inp=({label,value,onChange,unit,min,max,step="any"})=>(<div style={{marginBottom:14}}>

  </div>
</div>);
const Slider=({label,value,onChange,min,max,step=1,color=C.blue,unit})=>{
  const [txt,setTxt]=useState(String(value));const [synced,setSynced]=useState(value);
  if(value!==synced){setSynced(value);setTxt(String(value));}
  const pct=Math.min(100,Math.max(0,((value-min)/(max-min)*100))).toFixed(1);
  const sel=e=>{const t=e.target;setTimeout(()=>t.select(),0);};
  const handleSlider=e=>{const v=parseFloat(e.target.value);onChange(v);setTxt(String(v));};
  const handleType=e=>{setTxt(e.target.value);const n=parseFloat(e.target.value);if(!isNaN(n))onChange(Math.min(Math.max(n,min),max));};
  const handleBlur=()=>{const n=parseFloat(txt);if(isNaN(n)||n<min){onChange(min);setTxt(String(min));}else if(n>max){onChange(max);setTxt(String(max));}else{const r=Math.round(n*10000)/10000;setTxt(String(r));}};
  return(<div style={{marginBottom:18}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7,gap:8}}>
      <div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'.07em',flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:"'Barlow Condensed'"}}>{label}</div>
      <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>

        {unit&&<span style={{color,fontSize:11,opacity:.7,minWidth:20,textAlign:'left',fontFamily:"'Barlow'"}}>{unit}</span>}
      </div>
    </div>
    <input type="range" min={min} max={max} step={step} value={value} onChange={handleSlider} style={{width:'100%',accentColor:color,cursor:'pointer',background:`linear-gradient(90deg,${color} ${pct}%,${C.borderB} ${pct}%)`}}/>
    <div style={{display:'flex',justifyContent:'space-between',marginTop:2}}>
      <span style={{color:C.dim,fontSize:10,fontFamily:"'Share Tech Mono',monospace"}}>{min}</span>
      <span style={{color:C.dim,fontSize:10,fontFamily:"'Share Tech Mono',monospace"}}>{max}</span>
    </div>
  </div>);
};

                          background:isRec?C.orange:ok?C.green:C.muted}}/>
                        <div style={{flex:1}}>
                          <div style={{fontFamily:"'Share Tech Mono'",fontSize:18,fontWeight:isRec?700:400,
                            color:isRec?C.orange:ok?'#E0F0FF':C.muted}}>{m.name}</div>
                          {isRec&&<div style={{color:C.orange,fontSize:18}}>✓ מכונה קטנה מספיקה</div>}
                        </div>
                        <span style={{fontFamily:"'Share Tech Mono'",fontSize:18,
                          color:isRec?C.orange:ok?C.white+'88':C.muted}}>{m.tons}T</span>
                        <span style={{fontSize:15,color:ok?(isRec?C.orange:C.green):C.red}}>
                          {ok?'✓':'✗'}
                        </span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          ):(
            <div style={{background:C.card,border:'1px solid '+C.border,borderRadius:16,
              padding:32,textAlign:'center',marginBottom:14,color:C.muted,fontSize:18}}>
              הזן מידות מוצר לחישוב
            </div>
          )}

          {/* L/t bar */}
          {calc&&(
            <Card style={{padding:'14px 18px',marginBottom:14,borderRight:'3px solid '+ltC,borderColor:ltC+'33'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:8}}>
                <div style={{color:C.white,fontSize:15,fontWeight:600}}>יחס L/t</div>
                <div style={{display:'flex',alignItems:'baseline',gap:5}}>
                  <span style={{fontFamily:"'Share Tech Mono'",color:ltC,fontSize:26,fontWeight:700}}>{calc.lt}</span>
                  <span style={{color:C.muted,fontSize:15,fontFamily:"'Share Tech Mono'"}}>{'/ max '+mat.maxLt}</span>
                </div>
              </div>
              <div style={{background:C.bg,borderRadius:6,height:10,overflow:'hidden',marginBottom:5}}>
                <div style={{width:calc.ltPct+'%',height:'100%',borderRadius:6,transition:'width .4s',
                  background:calc.ltD?'linear-gradient(90deg,'+C.green+','+C.yellow+','+C.red+')'
                    :calc.ltW?'linear-gradient(90deg,'+C.green+','+C.yellow+')':C.green}}/>
              </div>
              {(calc.ltD||calc.ltW)&&(
                <div style={{background:ltC+'0f',border:'1px solid '+ltC+'33',borderRadius:8,padding:'8px 12px',marginTop:8}}>
                  <div style={{color:ltC,fontSize:18,fontWeight:700,marginBottom:2}}>
                    {calc.ltD?'⚠ L/t חורג — סכנת Short Shot':'⚡ L/t גבוה — קרוב לגבול החומר'}
                  </div>
                  <div style={{color:C.muted,fontSize:15}}>הוסף gates · הגדל עובי דופן · שנה לחומר עם MFI גבוה יותר</div>
                </div>
              )}
            </Card>
          )}

          {/* 6-cell grid */}
          {calc&&(
            <div className="r-k4" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:14}}>
              {[
                {l:'שטח הטלה',  v:calc.A+' cm²',   c:C.blue},
                {l:'L_flow',    v:calc.Leff+' mm',  c:C.muted},
                {l:'L/t',       v:String(calc.lt),  c:ltC},
                {l:'f(L/t)',    v:'x'+calc.f,        c:parseFloat(calc.f)>=1.3?C.red:parseFloat(calc.f)>=1.15?C.yellow:C.green},
                {l:'P cavity',  v:calc.Pcav+' bar', c:C.orange},
                {l:'SF',        v:'x'+mat.SF,        c:C.white},
              ].map((r,i)=>(
                <div key={i} style={{background:C.surf,border:'1px solid '+r.c+'18',borderRadius:10,padding:'10px 8px',textAlign:'center'}}>
                  <div style={{color:C.muted,fontSize:15,letterSpacing:'.06em',marginBottom:4,fontFamily:"'Barlow Condensed'"}}>{r.l}</div>
                  <div style={{fontFamily:"'Share Tech Mono'",color:r.c,fontSize:18,fontWeight:700}}>{r.v}</div>
                </div>
              ))}
            </div>
          )}

          {/* Formula chain */}
          {calc&&(
            <Card style={{padding:'16px 18px',marginBottom:14}}>
              <SectionLabel>שרשרת חישוב</SectionLabel>
              {[
                ['A_proj', L+'x'+W+'/100',              calc.A+' cm²',   C.blue],
                ['L_raw',  'sqrt(L+W)/2+D',             calc.Lraw+' mm', C.muted],
                ['L_eff',  calc.Lraw+'/sqrt('+gates+')',calc.Leff+' mm', gates>1?C.green:C.muted],
                ['L/t',    calc.Leff+'/'+wall,          String(calc.lt), ltC],
                ['f(L/t)', 'table',                     'x'+calc.f,      C.yellow],
                ['P_cav',  mat.P+'x'+calc.f,            calc.Pcav+' bar',C.orange],
                ['F',      calc.A+'x'+calc.Pcav+'x'+cavs+'x'+mat.SF+'/1000',calc.F+' ton',C.orange],
              ].map(([k,formula,result,col],i)=>(
                <div key={i} style={{display:'flex',alignItems:'baseline',gap:8,padding:'6px 0',
                  borderBottom:i<6?'1px solid '+C.border:undefined,flexWrap:'wrap'}}>
                  <span style={{color:C.muted,fontSize:15,minWidth:52,flexShrink:0,fontFamily:"'Share Tech Mono'"}}>{k}</span>
                  <span style={{color:C.dim,fontSize:15,flex:1,fontFamily:'monospace'}}>{formula}</span>
                  <span style={{fontFamily:"'Share Tech Mono'",whiteSpace:'nowrap',
                    color:i===6?C.orange:col,fontSize:i===6?14:12,fontWeight:i===6?700:500}}>{result}</span>
                </div>
              ))}
              <div style={{background:C.bg,borderRadius:8,padding:'9px 12px',marginTop:10,
                fontFamily:"'Share Tech Mono'",color:C.muted,fontSize:15}}>
                F = (LxW/100) x P_base x f(L/t) x n_cav x SF / 1000
              </div>
            </Card>
          )}

          {/* L/t table */}
          {calc&&(
            <Card style={{padding:'16px 18px',marginBottom:14}}>
              <SectionLabel>טבלת תיקון L/t</SectionLabel>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {LT_TABLE_INJ.map((row,i)=>{
                  const active=i===calc.ltIdx;
                  return(
                    <div key={i} style={{flex:1,minWidth:58,borderRadius:8,padding:'8px 6px',textAlign:'center',
                      background:active?row.color+'22':C.surf,border:'1px solid '+(active?row.color:C.border),
                      boxShadow:active?'0 0 10px '+row.color+'44':undefined}}>
                      <div style={{color:active?row.color:C.dim,fontSize:15,fontFamily:"'Share Tech Mono'",marginBottom:3}}>{row.label}</div>
                      <div style={{fontFamily:"'Exo 2'",fontSize:18,fontWeight:700,color:active?row.color:C.muted}}>{'x'+row.f}</div>
                    </div>
                  );
                })}
              </div>
            </Card>
          )}

          {/* History */}
          {hist.length>0&&(
            <Card style={{padding:'14px 18px',marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <div style={{color:C.muted,fontSize:18,fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',fontFamily:"'Barlow Condensed'"}}>היסטוריית חישובים</div>
                <button onClick={clearHist} style={{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:15,fontFamily:"'Barlow'"}}>מחק הכל</button>
              </div>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',minWidth:460,fontSize:15}}>
                  <thead><tr style={{borderBottom:'1px solid '+C.border}}>
                    {['שם','ממדים','G/C','חומר','L/t','כוח','מכונה','שעה'].map(h=>(
                      <th key={h} style={{padding:'4px 6px',color:C.muted,fontSize:15,fontWeight:700,letterSpacing:'.07em',textAlign:'right',fontFamily:"'Barlow Condensed'",whiteSpace:'nowrap'}}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {hist.map(e=>(
                      <tr key={e.id} style={{borderBottom:'1px solid '+C.border+'22'}}>
                        <td style={{padding:'5px 6px',color:C.white,fontWeight:600,whiteSpace:'nowrap'}}>{e.name}</td>
                        <td style={{padding:'5px 6px',color:C.muted,fontFamily:"'Share Tech Mono'",fontSize:18}}>{e.dims}</td>
                        <td style={{padding:'5px 6px',color:C.muted,fontFamily:"'Share Tech Mono'",fontSize:18}}>{e.gx}</td>
                        <td style={{padding:'5px 6px',color:C.muted,maxWidth:90,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.mat}</td>
                        <td style={{padding:'5px 6px',fontFamily:"'Share Tech Mono'",color:e.lt>200?C.red:e.lt>150?C.yellow:C.green}}>{e.lt}</td>
                        <td style={{padding:'5px 6px',fontFamily:"'Share Tech Mono'",color:C.orange,fontWeight:700}}>{e.F}T</td>
                        <td style={{padding:'5px 6px',fontFamily:"'Share Tech Mono'",fontSize:18,color:e.mach==='אין'?C.red:C.white}}>{e.mach}</td>
                        <td style={{padding:'5px 6px',fontFamily:"'Share Tech Mono'",fontSize:18,color:C.dim}}>{e.time}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Card>
          )}

          {mat.warn&&(
            <div style={{background:C.yellow+'0a',border:'1px solid '+C.yellow+'33',borderRadius:10,padding:'12px 16px',borderRight:'3px solid '+C.yellow}}>
              <div style={{color:C.yellow,fontSize:18,lineHeight:1.7}}>{mat.warn}</div>
            </div>
          )}
        </div>}

        right={<Card style={{padding:20}}>
          <SectionLabel>ממדי מוצר</SectionLabel>
          <Inp label="אורך (L)" value={L} onChange={setL} unit="mm" min="10" step="1"/>
          <Inp label="רוחב (W)" value={W} onChange={setW} unit="mm" min="10" step="1"/>
          <Inp label="עומק (D)" value={D} onChange={setD} unit="mm" min="0" step="1"/>
          <Inp label="עובי דופן (t)" value={wall} onChange={setWall} unit="mm" min="0.5" step="0.1"/>

          <div style={{height:1,background:C.border,margin:'14px 0'}}/>
          <SectionLabel>חומר גלם</SectionLabel>

          {/* Dropdown trigger */}
          <div onClick={()=>setMatOpen(o=>!o)} style={{display:'flex',alignItems:'center',
            justifyContent:'space-between',background:C.surf,cursor:'pointer',minHeight:48,
            border:'1px solid '+(matOpen?fc:C.borderB),
            borderRadius:matOpen?'9px 9px 0 0':9,padding:'10px 14px',transition:'border .2s'}}>
            <div style={{display:'flex',alignItems:'center',gap:9,minWidth:0}}>
              <span style={{background:fc+'22',color:fc,border:'1px solid '+fc+'44',borderRadius:4,
                padding:'2px 6px',fontSize:15,fontFamily:"'Share Tech Mono'",fontWeight:700,flexShrink:0}}>
                {mat.family}
              </span>
              <span style={{color:C.white,fontSize:18,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{mat.name}</span>
            </div>
            <span style={{color:C.muted,fontSize:18,flexShrink:0,marginRight:4}}>{matOpen?'▲':'▼'}</span>
          </div>

          {/* Dropdown list */}
          {matOpen&&(
            <div style={{border:'1px solid '+fc+'44',borderTop:'none',borderRadius:'0 0 9px 9px',
              background:C.card,marginBottom:12,overflow:'hidden'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,padding:'7px 12px',
                borderBottom:'1px solid '+C.border,background:C.surf}}>
                <span style={{color:C.muted,fontSize:15}}>⌕</span>
                <input value={search} onChange={e=>setSearch(e.target.value)} autoFocus
                  placeholder="PP, HDPE, PC..."
                  style={{flex:1,background:'transparent',border:'none',color:C.white,
                    fontSize:15,fontFamily:"'Barlow'",outline:'none',padding:'2px 0'}}/>
                {search&&<button onClick={()=>setSearch('')} style={{color:C.muted,background:'none',border:'none',cursor:'pointer',fontSize:15}}>✕</button>}
              </div>
              <div style={{maxHeight:200,overflowY:'auto'}}>
                {filteredMats.map(m=>{
                  const mfc=FAM_INJ_C[m.family]||C.blue;
                  const sel=m.id===matId;
                  return(
                    <div key={m.id} onClick={()=>{setMatId(m.id);setSearch('');setMatOpen(false);}}
                      style={{padding:'8px 12px',cursor:'pointer',borderBottom:'1px solid '+C.border,
                        background:sel?mfc+'18':'transparent',transition:'background .12s'}}
                      onMouseEnter={e=>{if(!sel)e.currentTarget.style.background=C.cardH;}}
                      onMouseLeave={e=>{e.currentTarget.style.background=sel?mfc+'18':'transparent';}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                        <div style={{minWidth:0}}>
                          <div style={{color:sel?C.white:'#A0C8E8',fontSize:18,fontWeight:sel?700:400,
                            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.name}</div>
                          <div style={{color:C.muted,fontSize:18,marginTop:1}}>{'MFI '+m.mfi+' · '+m.P+' bar'}</div>
                        </div>
                        <span style={{background:mfc+'22',color:mfc,border:'1px solid '+mfc+'44',borderRadius:4,
                          padding:'2px 5px',fontSize:15,fontFamily:"'Share Tech Mono'",flexShrink:0}}>{m.family}</span>
                      </div>
                    </div>
                  );
                })}
                {!filteredMats.length&&<div style={{padding:12,textAlign:'center',color:C.muted,fontSize:18}}>אין תוצאות</div>}
              </div>
            </div>
          )}

          {/* Mat info */}
          <div style={{background:C.surf,borderRadius:10,padding:'11px 13px',marginBottom:14,border:'1px solid '+fc+'33'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:8}}>
              <div style={{color:C.white,fontSize:18,fontWeight:600,lineHeight:1.3}}>{mat.name}</div>
              <Badge color={fc}>{mat.family}</Badge>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
              {[{l:'צילינדר',v:mat.melt},{l:'תבנית',v:mat.mold},{l:'כיווץ',v:mat.shrink},{l:'P_base',v:mat.P+' bar'},{l:'SF',v:String(mat.SF)},{l:'Max L/t',v:String(mat.maxLt)}].map(r=>(
                <div key={r.l} style={{background:C.bg,borderRadius:6,padding:'5px 8px'}}>
                  <div style={{color:C.muted,fontSize:15,marginBottom:1,fontFamily:"'Barlow Condensed'"}}>{r.l}</div>
                  <div style={{color:C.white,fontSize:18,fontFamily:"'Share Tech Mono'",fontWeight:600}}>{r.v}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{height:1,background:C.border,margin:'14px 0'}}/>
          <SectionLabel>Cavities</SectionLabel>
          <div style={{display:'flex',gap:6,marginBottom:14,alignItems:'center',flexWrap:'wrap'}}>
            {[1,2,4,6,8,12,16].map(n=>(
              <button key={n} onClick={()=>setCavs(n)} style={{
                padding:'7px 9px',borderRadius:8,cursor:'pointer',fontFamily:"'Share Tech Mono'",
                fontWeight:700,fontSize:18,minHeight:36,minWidth:38,
                border:'1px solid '+(cavs===n?C.orange:C.border),
                background:cavs===n?C.orange+'22':C.surf,
                color:cavs===n?C.orange:C.muted,transition:'all .15s'}}>{n}</button>
            ))}
            <input type="number" min="1" max="16" value={cavs}
              onChange={e=>setCavs(Math.min(16,Math.max(1,parseInt(e.target.value)||1)))}
              style={{width:46,background:C.orange+'11',border:'1px solid '+C.orange+'44',borderRadius:8,
                color:C.orange,padding:'7px 5px',fontSize:18,fontFamily:"'Share Tech Mono'",
                fontWeight:700,textAlign:'center',outline:'none'}}/>
          </div>

          <div style={{height:1,background:C.border,margin:'14px 0'}}/>
          <SectionLabel>Gates</SectionLabel>
          <div style={{color:C.muted,fontSize:15,marginBottom:7}}>L_flow מחולק ב- sqrt(Gates)</div>
          <div style={{display:'flex',gap:6,marginBottom:6,alignItems:'center',flexWrap:'wrap'}}>
            {[1,2,3,4,6].map(n=>(
              <button key={n} onClick={()=>setGates(n)} style={{
                padding:'7px 9px',borderRadius:8,cursor:'pointer',fontFamily:"'Share Tech Mono'",
                fontWeight:700,fontSize:18,minHeight:36,minWidth:38,
                border:'1px solid '+(gates===n?C.cyan:C.border),
                background:gates===n?C.cyan+'18':C.surf,
                color:gates===n?C.cyan:C.muted,transition:'all .15s'}}>{n}</button>
            ))}
            <input type="number" min="1" max="12" value={gates}
              onChange={e=>setGates(Math.min(12,Math.max(1,parseInt(e.target.value)||1)))}
              style={{width:46,background:C.cyan+'11',border:'1px solid '+C.cyan+'44',borderRadius:8,
                color:C.cyan,padding:'7px 5px',fontSize:18,fontFamily:"'Share Tech Mono'",
                fontWeight:700,textAlign:'center',outline:'none'}}/>
          </div>
          {gates>1&&calc&&(
            <div style={{background:C.green+'0a',border:'1px solid '+C.green+'22',borderRadius:8,
              padding:'7px 12px',marginBottom:8,color:C.green,fontFamily:"'Share Tech Mono'",fontSize:15}}>
              {calc.Lraw+'mm → '+calc.Leff+'mm (-'+Math.round((1-1/Math.sqrt(gates))*100)+'%)'}
            </div>
          )}

          <div style={{height:1,background:C.border,margin:'14px 0'}}/>
          <SectionLabel>שמור חישוב</SectionLabel>
          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <input value={pName} onChange={e=>setPName(e.target.value)}
              placeholder="שם מוצר..."
              style={{flex:1,background:C.surf,border:'1px solid '+C.borderB,borderRadius:9,
                color:C.white,padding:'10px 12px',fontSize:15,fontFamily:"'Barlow'",outline:'none'}}/>
          </div>
          <button onClick={saveCalc} disabled={!calc}
            style={{width:'100%',padding:10,borderRadius:9,cursor:calc?'pointer':'default',minHeight:42,
              background:calc?C.green+'18':C.muted+'0a',border:'1px solid '+(calc?C.green+'44':C.border),
              color:calc?C.green:C.muted,fontSize:15,fontFamily:"'Barlow'",
              display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            ✓ שמור לרשומת היסטוריה
          </button>

          <div style={{height:1,background:C.border,margin:'14px 0'}}/>
          <SectionLabel>AI — חילוץ מידות</SectionLabel>
          <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:'none'}}/>
          <button onClick={()=>fileRef.current&&fileRef.current.click()}
            style={{width:'100%',padding:10,borderRadius:9,cursor:'pointer',minHeight:42,marginBottom:8,
              background:C.blue+'12',border:'1px solid '+C.blue+'44',color:C.blue,
              fontSize:15,fontFamily:"'Barlow'",display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            ↑ העלה סרטוט / תמונה
          </button>
          {imgPrev&&(
            <div style={{borderRadius:8,overflow:'hidden',border:'1px solid '+C.border,marginBottom:8}}>
              <img src={imgPrev} alt="drawing" style={{width:'100%',maxHeight:120,objectFit:'contain',background:C.bg,display:'block'}}/>
            </div>
          )}
          {imgPrev&&(
            <button onClick={runAI} disabled={aiLoad}
              style={{width:'100%',padding:10,borderRadius:9,cursor:aiLoad?'default':'pointer',minHeight:42,
                background:aiLoad?C.muted+'0a':C.orange+'14',border:'1px solid '+(aiLoad?C.border:C.orange+'55'),
                color:aiLoad?C.muted:C.orange,fontSize:15,fontFamily:"'Barlow'",
                display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              {aiLoad?'מנתח...':'✦ חלץ מידות עם AI'}
            </button>
          )}
          {aiMsg&&(
            <div style={{background:aiMsg.ok?C.green+'10':C.yellow+'10',
              border:'1px solid '+(aiMsg.ok?C.green:C.yellow)+'33',borderRadius:8,padding:'8px 12px',marginTop:8}}>
              <div style={{color:aiMsg.ok?C.green:C.yellow,fontSize:18}}>{aiMsg.text}</div>
            </div>
          )}
        </Card>}
      />
    </ToolLayout>
  );
};

  {id:'bearings', title:'טולרנסים למיסבים',    desc:'התאמת גל ובית לפי סוג עומס וסיבוב',              cat:'מיסבים',    c:C.blue,   comp:BearingTolerances},

  {id:'worm',     title:'תכנון גיר חלזוני',     desc:'חישוב מומנט ונצילות גיר NMRV',                  cat:'גירים',     c:C.blue,   comp:WormGearDesign},

  {id:'film',     title:'משקל גליל פילם',       desc:'חישוב משקל ואורך גליל יריעה פלסטיק',          cat:'ייצור',     c:C.yellow, comp:FilmRollWeight},

// ── TOOL CARD ─────────────────────────────────────────────
const ToolCard=({tool,onClick})=>{
  const [hov,setHov]=useState(false),[tilt,setTilt]=useState({x:0,y:0});
  const cardRef=useRef(null);
  const handleMove=e=>{if(!cardRef.current)return;const r=cardRef.current.getBoundingClientRect();const x=(e.clientX-r.left)/r.width-0.5,y=(e.clientY-r.top)/r.height-0.5;setTilt({x:y*9,y:-x*9});};
  const handleLeave=()=>{setHov(false);setTilt({x:0,y:0});};
  return(
    <div ref={cardRef} className="tool-card" onClick={onClick}
      onMouseEnter={()=>setHov(true)} onMouseLeave={handleLeave} onMouseMove={handleMove}
      style={{background:hov?C.cardH:C.card,borderRadius:16,padding:'20px 20px 18px',cursor:'pointer',
        border:`1px solid ${hov?tool.c+'55':C.border}`,
        boxShadow:hov?`0 14px 42px ${tool.c}30,inset 0 1px 0 ${tool.c}22`:`0 2px 8px ${C.bg}`,
        transform:hov?`perspective(700px) rotateX(${tilt.x}deg) rotateY(${tilt.y}deg) translateY(-5px)`:'perspective(700px) rotateX(0) rotateY(0) translateY(0)',
        transition:hov?'box-shadow .2s,border .2s,background .2s':'all .4s cubic-bezier(.2,.8,.3,1)',
        position:'relative',overflow:'hidden',minHeight:44,willChange:'transform'}}>
      <div className="bp-c bp-tl" style={{color:tool.c}}/><div className="bp-c bp-tr" style={{color:tool.c}}/>
      <div className="bp-c bp-bl" style={{color:tool.c}}/><div className="bp-c bp-br" style={{color:tool.c}}/>
      <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:hov?`linear-gradient(90deg,transparent,${tool.c},${tool.c}88,transparent)`:`${tool.c}44`,transition:'background .3s'}}/>
      <div style={{position:'absolute',bottom:-4,left:-4,fontSize:64,opacity:.03,fontFamily:"'Exo 2',sans-serif",fontWeight:900,color:C.white,userSelect:'none',lineHeight:1}}>{tool.id.slice(0,2).toUpperCase()}</div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12,position:'relative'}}>
        <div style={{background:`${tool.c}22`,border:`1px solid ${tool.c}44`,borderRadius:5,padding:'3px 9px',display:'flex',alignItems:'center',gap:5}}><div style={{width:4,height:4,borderRadius:'50%',background:tool.c,flexShrink:0}}/><span style={{color:tool.c,fontSize:9,fontWeight:700,letterSpacing:'.1em',fontFamily:"'Share Tech Mono',monospace"}}>{tool.cat}</span></div>
        <div style={{color:hov?tool.c:C.dim,fontSize:16,transition:'all .25s',transform:hov?'translateX(-4px)':'translateX(0)'}}>←</div>
      </div>
      <div className="tool-icon-wrap" style={{display:'flex',justifyContent:'center',marginBottom:14,opacity:hov?1:0.6,filter:hov?`drop-shadow(0 0 10px ${tool.c}55)`:'none'}}><ToolIcon id={tool.id} c={tool.c} size={68}/></div>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,color:hov?C.white:`${C.white}bb`,letterSpacing:'.02em',marginBottom:5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',position:'relative'}}>{tool.title}</div>
      <div style={{color:C.muted,fontSize:13,lineHeight:1.5,position:'relative'}}>{tool.desc}</div>
    </div>
  );
};

// ── PARTICLE CANVAS ───────────────────────────────────────
const ParticleCanvas=()=>{
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current;if(!cv)return;const ctx=cv.getContext('2d');
    const resize=()=>{cv.width=cv.offsetWidth;cv.height=cv.offsetHeight;};resize();
    window.addEventListener('resize',resize);
    const pts=Array.from({length:38},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,vx:(Math.random()-.5)*0.32,vy:(Math.random()-.5)*0.32,r:Math.random()*2.2+0.8,op:Math.random()*0.55+0.2}));
    let raf;
    const draw=()=>{ctx.clearRect(0,0,cv.width,cv.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=cv.width;if(p.x>cv.width)p.x=0;if(p.y<0)p.y=cv.height;if(p.y>cv.height)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(74,158,255,${p.op})`;ctx.fill();});for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);if(d<110){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(74,158,255,${0.18*(1-d/110)})`;ctx.lineWidth=0.8;ctx.stroke();}}raf=requestAnimationFrame(draw);};
    draw();
    return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
  },[]);
  return <canvas ref={ref} style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:0}}/>;
};

  return(<div style={{textAlign:'center'}}><div style={{fontFamily:"'Exo 2',sans-serif",fontSize:30,fontWeight:700,color:C.blue}}>{val}{suffix}</div><div style={{color:C.muted,fontSize:11,letterSpacing:'.04em',fontFamily:"'Barlow Condensed'"}}>{label}</div></div>);
};

// ── APP ───────────────────────────────────────────────────
function App(){
  const [active,setActive]=useState(null),[scanning,setScanning]=useState(false);
  const selectTool=id=>{setScanning(true);setTimeout(()=>{setActive(id);setScanning(false);},280);};
  const goBack=()=>{setScanning(true);setTimeout(()=>{setActive(null);setScanning(false);},280);};
  const map=Object.fromEntries(TOOLS.map(t=>[t.id,t.comp]));
  const Comp=active?map[active]:null;
  return(<><style>{CSS}</style>{scanning&&<div className="scan-overlay"/>}{Comp?<Comp onBack={goBack} key={active}/>:<LandingPage onSelect={selectTool}/>}</>);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
